<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIF 건설재해 위험성평가 - 공정조회</title>
  <script>if(localStorage.getItem('sif-theme')==='light'){document.documentElement.classList.replace('dark','light')}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div id="sidebar"></div>

  <main id="content" class="p-4 lg:p-6">
    <div id="page-header"></div>

    <!-- 필터 바 -->
    <div class="filter-bar mb-4">
      <div class="filter-group">
        <div id="koen-toggle-wrap"></div>
      </div>
      <div class="filter-group">
        <label>공종</label>
        <div id="ms-gongzong"></div>
      </div>
      <div class="filter-group">
        <label>작업명</label>
        <div id="ms-work"></div>
      </div>
      <div class="filter-group">
        <label>단위작업명</label>
        <div id="ms-unit-work"></div>
      </div>
      <div class="filter-group">
        <label>기인물</label>
        <div id="ms-cause"></div>
      </div>
      <button id="btn-reset" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg transition-colors">초기화</button>
    </div>
    <div id="keyword-search-wrap" class="mb-4"></div>

    <!-- 결과 요약 -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4" id="result-summary">
    </div>

    <!-- 차트: 기인물별 + 재해형태 한 행 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
      <div class="chart-container">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">기인물별 사고건수</h3>
        <div style="height:300px"><canvas id="chart-cause"></canvas></div>
      </div>
      <div class="chart-container">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">재해형태 비율</h3>
        <div style="height:300px"><canvas id="chart-disaster"></canvas></div>
      </div>
    </div>

    <!-- 재해사례 목록 (풀폭) -->
    <div class="chart-container">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-gray-300">재해사례 및 감소대책</h3>
      </div>
      <div id="data-table"></div>
    </div>
  </main>

  <script src="../js/data-loader.js"></script>
  <script src="../js/filter-manager.js"></script>
  <script src="../js/chart-manager.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/multi-select.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/app.js"></script>

  <script>
    const cm = new ChartManager();
    const fm = new FilterManager(['koen', '공종', '작업명', '단위작업명', '기인물', 'keyword']);
    fm.setDownstream('공종', ['작업명', '단위작업명', '기인물']);
    fm.setDownstream('작업명', ['단위작업명', '기인물']);
    fm.setDownstream('단위작업명', ['기인물']);

    let allData = [];
    let dropdownRef = {};
    let keywordInput = null;

    // 멀티셀렉트 인스턴스
    const msGongzong = new MultiSelect({
      containerId: 'ms-gongzong',
      placeholder: '전체 공종',
      onChange: (values) => fm.set('공종', values)
    });
    const msWork = new MultiSelect({
      containerId: 'ms-work',
      placeholder: '작업명 선택',
      onChange: (values) => fm.set('작업명', values)
    });
    const msUnitWork = new MultiSelect({
      containerId: 'ms-unit-work',
      placeholder: '단위작업명 선택',
      onChange: (values) => fm.set('단위작업명', values)
    });
    const msCause = new MultiSelect({
      containerId: 'ms-cause',
      placeholder: '전체 기인물',
      showCounts: true,
      onChange: (values) => fm.set('기인물', values)
    });

    async function init() {
      renderPageHeader('공정조회', 'Excel ③공정조회 시트 기반 - 공정별 재해사례 조회');

      allData = await DataLoader.loadDB();
      dropdownRef = await DataLoader.loadDropdownRef();

      keywordInput = createKeywordSearch('keyword-search-wrap', (val) => fm.set('keyword', val));

      setupFilters();
      renderResults();
    }

    function setupFilters() {
      const hierarchy = dropdownRef.hierarchy || {};
      const allGongzong = Object.keys(hierarchy);

      // 초기 공종 옵션
      msGongzong.setOptions(allGongzong.map(g => ({ value: g, label: g })));
      msWork.setOptions([]);
      msUnitWork.setOptions([]);

      // 기인물 전체 목록 (건수 내림차순)
      updateCauseDropdown();

      // 발전소 공정 토글
      let koenToggleReset = null;
      koenToggleReset = createKoenToggle('koen-toggle-wrap', (val) => {
        fm.set('koen', val);
      });

      // 초기화
      document.getElementById('btn-reset').addEventListener('click', () => {
        fm.reset();
        if (koenToggleReset) koenToggleReset();
        if (keywordInput) keywordInput.value = '';
        msGongzong.clear();
        msWork.clear();
        msUnitWork.clear();
        msCause.clear();
        msGongzong.setOptions(allGongzong.map(g => ({ value: g, label: g })));
        msWork.setOptions([]);
        msUnitWork.setOptions([]);
        updateCauseDropdown();
      });

      // 발전소 공정 필터 변경 시 공종 드롭다운 갱신
      fm.subscribe('koen', (val) => {
        if (val === true) {
          const koenGongzong = [...new Set(allData.filter(r => r.KOEN공정).map(r => r['공종']))].sort();
          msGongzong.setOptions(koenGongzong.map(g => ({ value: g, label: g })));
        } else {
          msGongzong.setOptions(allGongzong.map(g => ({ value: g, label: g })));
        }
        msGongzong.clear();
        msWork.clear();
        msUnitWork.clear();
      });

      // Cascading: 공종 변경 시 작업명 갱신 (복수 공종 → 합집합)
      fm.subscribe('공종', (val) => {
        if (val) {
          const selected = Array.isArray(val) ? val : [val];
          const works = new Set();
          selected.forEach(gz => {
            if (hierarchy[gz]) Object.keys(hierarchy[gz]).forEach(w => works.add(w));
          });
          msWork.setOptions([...works].sort().map(w => ({ value: w, label: w })));
        } else {
          msWork.setOptions([]);
        }
        msWork.clear();
        msUnitWork.clear();
        updateCauseDropdown();
      });

      // Cascading: 작업명 변경 시 단위작업명 갱신 (복수 조합 → 합집합)
      fm.subscribe('작업명', (val) => {
        const gzVal = fm.get('공종');
        if (gzVal && val) {
          const gzList = Array.isArray(gzVal) ? gzVal : [gzVal];
          const workList = Array.isArray(val) ? val : [val];
          const units = new Set();
          gzList.forEach(gz => {
            workList.forEach(w => {
              if (hierarchy[gz] && hierarchy[gz][w]) {
                hierarchy[gz][w].forEach(u => units.add(u));
              }
            });
          });
          msUnitWork.setOptions([...units].sort().map(u => ({ value: u, label: u })));
        } else {
          msUnitWork.setOptions([]);
        }
        msUnitWork.clear();
        updateCauseDropdown();
      });

      // 단위작업명 변경 시 기인물 갱신
      fm.subscribe('단위작업명', () => {
        updateCauseDropdown();
      });

      // 데이터 변경 시 결과 갱신
      fm.onDataChange(() => renderResults());
    }

    // 상위 필터에 따라 기인물 드롭다운 범위 제한 + 건수 내림차순 정렬
    function updateCauseDropdown() {
      const filters = fm.getAll();
      const filtersWithoutCause = { ...filters };
      delete filtersWithoutCause['기인물'];
      const filtered = filterDB(allData, filtersWithoutCause);

      const causeMap = {};
      filtered.forEach(r => {
        const c = r['기인물'];
        if (c) causeMap[c] = (causeMap[c] || 0) + 1;
      });
      const sorted = Object.entries(causeMap).sort((a, b) => b[1] - a[1]);

      msCause.setOptions(sorted.map(([cause, count]) => ({
        value: cause,
        label: cause,
        count: count
      })));
    }

    function renderResults() {
      const filters = fm.getAll();
      const filtered = filterDB(allData, filters);

      renderSummary(filtered);
      renderTable(filtered);
      renderCauseChart(filtered);
      renderDisasterChart(filtered);
    }

    function renderSummary(data) {
      const total = data.length;
      const causeCount = new Set(data.map(r => r['기인물'])).size;
      const disasterCount = new Set(data.map(r => r['재해형태'])).size;
      const is12Count = data.filter(r => r['12대기인물']).length;

      document.getElementById('result-summary').innerHTML = `
        <div class="stat-card">
          <p class="text-xs text-gray-500">조회 건수</p>
          <p class="text-2xl font-bold text-white">${formatNumber(total)}</p>
        </div>
        <div class="stat-card">
          <p class="text-xs text-gray-500">기인물 종류</p>
          <p class="text-2xl font-bold text-blue-400">${causeCount}</p>
        </div>
        <div class="stat-card">
          <p class="text-xs text-gray-500">재해형태 종류</p>
          <p class="text-2xl font-bold text-amber-400">${disasterCount}</p>
        </div>
        <div class="stat-card">
          <p class="text-xs text-gray-500">12대 기인물 비중</p>
          <p class="text-2xl font-bold text-purple-400">${formatPercent(is12Count, total)}</p>
        </div>
      `;
    }

    function renderTable(data) {
      const columns = [
        { key: 'id', label: 'No', width: 40 },
        { key: '기인물', label: '기인물', width: 100, wrap: true },
        { key: '재해형태', label: '재해형태', width: 70 },
        { key: '재해개요', label: '재해개요', minWidth: 250, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '재해유발요인', label: '재해유발요인', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '위험성감소대책', label: '감소대책', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
      ];
      buildTable('data-table', columns, data, {
        pageSize: 10,
        filterColumns: ['기인물', '재해형태']
      });
    }

    function renderCauseChart(data) {
      const agg = aggregateBy(data, '기인물');
      const sorted = topN(agg, 'count', 8);

      cm.create('chart-cause', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a.key),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1,
            borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#1F2937' }, ticks: { font: { size: 10 } } },
            y: { grid: { display: false }, ticks: { font: { size: 9 } } }
          }
        }
      });
    }

    function renderDisasterChart(data) {
      const agg = aggregateBy(data, '재해형태');
      const sorted = topN(agg, 'count', 8);

      cm.create('chart-disaster', {
        type: 'doughnut',
        data: {
          labels: sorted.map(a => a.key),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 0,
          }]
        },
        options: {
          cutout: '50%',
          plugins: {
            legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } },
            datalabels: {
              display: true, color: '#fff',
              font: { size: 9, weight: 'bold' },
              formatter: (value, ctx) => {
                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                const pct = (value / total * 100).toFixed(1);
                if (pct < 5) return '';
                return `${value}건\n${pct}%`;
              },
              textAlign: 'center',
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    init();
  </script>
</body>
</html>
