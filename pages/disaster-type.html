<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIF 건설재해 위험성평가 - 재해형태 분석</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 화살표 구분자 */
    .filter-arrow {
      display: flex;
      align-items: flex-end;
      padding-bottom: 0.625rem;
      color: #6B7280;
      font-size: 1rem;
    }
    .filter-arrow svg {
      width: 1.25rem;
      height: 1.25rem;
    }
    /* 필터 행 구분선 */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: flex-end;
    }
    .filter-row + .filter-row {
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid #1F2937;
    }
    @media (max-width: 767px) {
      .filter-bar { flex-direction: column; gap: 0.5rem; }
      .filter-row { flex-direction: column; gap: 0.5rem; }
      .filter-group { width: 100%; }
      .filter-group select, .ms-dropdown { width: 100%; min-width: 0; }
      .filter-group label { min-width: auto; }
      .filter-arrow { display: none; }
      #btn-reset { width: 100%; }
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div id="sidebar"></div>

  <main id="content" class="p-4 lg:p-6">
    <div id="page-header"></div>

    <!-- 필터 바 -->
    <div class="filter-bar mb-4" style="flex-direction:column; align-items:stretch;">
      <!-- 1행: 발전소공정 | 재해형태 | 기인물 -->
      <div class="filter-row">
        <div class="filter-group" id="koen-toggle-wrap"></div>
        <div class="filter-group">
          <label>재해형태</label>
          <div id="ms-disaster"></div>
        </div>
        <div class="filter-group">
          <label>기인물</label>
          <div id="ms-cause"></div>
        </div>
      </div>
      <!-- 2행: 공종 → 작업명 → 단위작업명 | 초기화 -->
      <div class="filter-row">
        <div class="filter-group">
          <label>공종</label>
          <div id="ms-gz"></div>
        </div>
        <div class="filter-arrow">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
        <div class="filter-group">
          <label>작업명</label>
          <div id="ms-work"></div>
        </div>
        <div class="filter-arrow">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
        <div class="filter-group">
          <label>단위작업명</label>
          <div id="ms-unit"></div>
        </div>
        <button id="btn-reset" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg transition-colors" style="margin-left:auto;">초기화</button>
      </div>
    </div>
    <div id="keyword-search-wrap" class="mb-4"></div>

    <!-- 요약 카드 -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4" id="summary-cards"></div>

    <!-- 전체 요약 바 차트 (재해형태 미선택 시) -->
    <div id="overview-section" class="chart-container mb-4">
      <h3 class="text-sm font-semibold text-gray-300 mb-3">재해형태별 사고건수</h3>
      <div style="height:400px"><canvas id="chart-overview"></canvas></div>
    </div>

    <!-- 상세 분석 영역 (재해형태 선택 시) -->
    <div id="detail-section" class="hidden">
      <!-- 공종별 / 기인물별 분포 -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <div class="chart-container">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-semibold text-gray-300">공종별 사고건수</h3>
          </div>
          <div id="chart-gz-wrap" style="height:350px"><canvas id="chart-by-gz"></canvas></div>
        </div>
        <div class="chart-container">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-semibold text-gray-300" id="cause-chart-title">기인물별 사고건수 (Top 15)</h3>
            <button class="toggle-btn text-xs" id="btn-cause-all">전체 보기</button>
          </div>
          <div id="chart-cause-wrap" style="height:350px"><canvas id="chart-by-cause"></canvas></div>
        </div>
      </div>

      <!-- 작업명별 분포 + 히트맵 -->
      <div class="grid grid-cols-1 xl:grid-cols-3 gap-4 mb-4">
        <div class="chart-container">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-semibold text-gray-300" id="work-chart-title">작업명별 사고건수 (Top 15)</h3>
            <button class="toggle-btn text-xs" id="btn-work-all">전체 보기</button>
          </div>
          <div id="chart-work-wrap" style="height:400px"><canvas id="chart-by-work"></canvas></div>
        </div>
        <div class="xl:col-span-2 chart-container">
          <h3 class="text-sm font-semibold text-gray-300 mb-3">공종 × 기인물분류 히트맵</h3>
          <div id="heatmap-gz-cause-class" class="overflow-x-auto" style="max-height:400px"></div>
        </div>
      </div>

      <!-- 재해사례 테이블 -->
      <div class="chart-container">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">재해사례 및 예방대책</h3>
        <div id="data-table"></div>
      </div>
    </div>
  </main>

  <script src="../js/data-loader.js"></script>
  <script src="../js/filter-manager.js"></script>
  <script src="../js/chart-manager.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/multi-select.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/app.js"></script>

  <script>
    const cm = new ChartManager();
    const fm = new FilterManager(['koen', '재해형태', '기인물', '공종', '작업명', '단위작업명', 'keyword']);
    let keywordInput = null;
    fm.setDownstream('재해형태', ['기인물', '공종', '작업명', '단위작업명']);
    fm.setDownstream('기인물', ['공종', '작업명', '단위작업명']);
    fm.setDownstream('공종', ['작업명', '단위작업명']);
    fm.setDownstream('작업명', ['단위작업명']);

    let allData = [];
    let dropdownRef = {};
    let disasterCountMap = {};
    let showAllCause = false;
    let showAllWork = false;
    let currentFiltered = [];

    // 멀티셀렉트 인스턴스
    const msDisaster = new MultiSelect({
      containerId: 'ms-disaster',
      placeholder: '전체 재해형태',
      showCounts: true,
      onChange: (values) => fm.set('재해형태', values)
    });
    const msCause = new MultiSelect({
      containerId: 'ms-cause',
      placeholder: '전체 기인물',
      showCounts: true,
      onChange: (values) => fm.set('기인물', values)
    });
    const msGz = new MultiSelect({
      containerId: 'ms-gz',
      placeholder: '공종 선택',
      showCounts: true,
      onChange: (values) => fm.set('공종', values)
    });
    const msWork = new MultiSelect({
      containerId: 'ms-work',
      placeholder: '작업명 선택',
      showCounts: true,
      onChange: (values) => fm.set('작업명', values)
    });
    const msUnit = new MultiSelect({
      containerId: 'ms-unit',
      placeholder: '단위작업명 선택',
      showCounts: true,
      onChange: (values) => fm.set('단위작업명', values)
    });

    async function init() {
      renderPageHeader('재해형태 분석', '재해형태 기준 역방향 조회 - 해당 재해형태가 발생하는 공정·기인물 분석');

      allData = await DataLoader.loadDB();
      dropdownRef = await DataLoader.loadDropdownRef();

      allData.forEach(r => {
        const dt = r['재해형태'];
        if (dt) disasterCountMap[dt] = (disasterCountMap[dt] || 0) + 1;
      });

      setupFilters();
      setupToggleButtons();
      renderResults();
    }

    // 상위 필터 적용 후 데이터 반환 (지정된 키까지만)
    function getFilteredUpTo(excludeKeys) {
      const filters = fm.getAll();
      const partial = {};
      Object.keys(filters).forEach(k => {
        if (!excludeKeys.includes(k)) partial[k] = filters[k];
      });
      return filterDB(allData, partial);
    }

    function setupFilters() {
      createKoenToggle('koen-toggle-wrap', (val) => fm.set('koen', val));
      keywordInput = createKeywordSearch('keyword-search-wrap', (val) => fm.set('keyword', val));

      populateDisasterDropdown();
      populateCauseDropdown();
      msGz.setOptions([]);
      msWork.setOptions([]);
      msUnit.setOptions([]);

      // koen 변경 시 모든 드롭다운 갱신
      fm.subscribe('koen', () => {
        populateDisasterDropdown();
        populateCauseDropdown();
        updateGzDropdown();
        updateWorkDropdown();
        updateUnitDropdown();
      });

      // 재해형태 변경 시 하위 드롭다운 갱신
      fm.subscribe('재해형태', () => {
        populateCauseDropdown();
        updateGzDropdown();
        updateWorkDropdown();
        updateUnitDropdown();
        msCause.clear();
        msGz.clear();
        msWork.clear();
        msUnit.clear();
      });

      // 기인물 변경 시 공종 이하 갱신
      fm.subscribe('기인물', () => {
        updateGzDropdown();
        updateWorkDropdown();
        updateUnitDropdown();
        msGz.clear();
        msWork.clear();
        msUnit.clear();
      });

      // 공종 변경 시 작업명/단위작업명 갱신
      fm.subscribe('공종', () => {
        updateWorkDropdown();
        updateUnitDropdown();
        msWork.clear();
        msUnit.clear();
      });

      // 작업명 변경 시 단위작업명 갱신
      fm.subscribe('작업명', () => {
        updateUnitDropdown();
        msUnit.clear();
      });

      // 초기화
      document.getElementById('btn-reset').addEventListener('click', () => {
        fm.reset();
        showAllCause = false;
        showAllWork = false;
        document.getElementById('btn-cause-all').textContent = '전체 보기';
        document.getElementById('btn-work-all').textContent = '전체 보기';
        msDisaster.clear();
        msCause.clear();
        msGz.clear();
        msWork.clear();
        msUnit.clear();
        const koenToggle = document.getElementById('koen-toggle-wrap-toggle');
        if (koenToggle) {
          koenToggle.checked = false;
          document.getElementById('koen-toggle-wrap-label').textContent = '전체';
        }
        if (keywordInput) keywordInput.value = '';
        populateDisasterDropdown();
        populateCauseDropdown();
        msGz.setOptions([]);
        msWork.setOptions([]);
        msUnit.setOptions([]);
      });

      fm.onDataChange(() => renderResults());
    }

    function getBaseData() {
      const filters = fm.getAll();
      let data = [...allData];
      if (filters.koen === true) data = data.filter(r => r.KOEN공정);
      return data;
    }

    function populateDisasterDropdown() {
      const data = getBaseData();
      const dtMap = {};
      data.forEach(r => { const dt = r['재해형태']; if (dt) dtMap[dt] = (dtMap[dt] || 0) + 1; });
      const sorted = Object.entries(dtMap).sort((a, b) => b[1] - a[1]);
      msDisaster.setOptions(sorted.map(([dt, count]) => ({
        value: dt, label: dt, count: count
      })));
    }

    function populateCauseDropdown() {
      const data = getFilteredUpTo(['기인물', '공종', '작업명', '단위작업명']);
      const causeMap = {};
      data.forEach(r => { const c = r['기인물']; if (c) causeMap[c] = (causeMap[c] || 0) + 1; });
      const sorted = Object.entries(causeMap).sort((a, b) => b[1] - a[1]);
      msCause.setOptions(sorted.map(([cause, count]) => ({
        value: cause, label: cause, count: count
      })));
    }

    function updateGzDropdown() {
      const data = getFilteredUpTo(['공종', '작업명', '단위작업명']);
      const gzCounts = {};
      data.forEach(r => { const gz = r['공종']; if (gz) gzCounts[gz] = (gzCounts[gz] || 0) + 1; });
      const sorted = Object.entries(gzCounts).sort((a, b) => b[1] - a[1]);
      msGz.setOptions(sorted.map(([gz, count]) => ({
        value: gz, label: gz.replace(/^\d+\.\s*/, ''), count: count
      })));
    }

    function updateWorkDropdown() {
      const data = getFilteredUpTo(['작업명', '단위작업명']);
      const workCounts = {};
      data.forEach(r => { const w = r['작업명']; if (w) workCounts[w] = (workCounts[w] || 0) + 1; });
      const sorted = Object.entries(workCounts).sort((a, b) => b[1] - a[1]);
      msWork.setOptions(sorted.map(([w, count]) => ({
        value: w, label: w, count: count
      })));
    }

    function updateUnitDropdown() {
      const data = getFilteredUpTo(['단위작업명']);
      const unitCounts = {};
      data.forEach(r => { const u = r['단위작업명']; if (u) unitCounts[u] = (unitCounts[u] || 0) + 1; });
      const sorted = Object.entries(unitCounts).sort((a, b) => b[1] - a[1]);
      msUnit.setOptions(sorted.map(([u, count]) => ({
        value: u, label: u, count: count
      })));
    }

    function setupToggleButtons() {
      document.getElementById('btn-cause-all').addEventListener('click', () => {
        showAllCause = !showAllCause;
        document.getElementById('btn-cause-all').textContent = showAllCause ? 'Top 15' : '전체 보기';
        renderByCauseChart(currentFiltered);
      });
      document.getElementById('btn-work-all').addEventListener('click', () => {
        showAllWork = !showAllWork;
        document.getElementById('btn-work-all').textContent = showAllWork ? 'Top 15' : '전체 보기';
        renderByWorkChart(currentFiltered);
      });
    }

    function renderResults() {
      const filters = fm.getAll();
      const filtered = filterDB(allData, filters);
      currentFiltered = filtered;
      const selectedDT = filters['재해형태'];

      renderSummaryCards(filtered, selectedDT);

      if (!selectedDT && !filters['기인물']) {
        document.getElementById('overview-section').classList.remove('hidden');
        document.getElementById('detail-section').classList.add('hidden');
        renderOverviewChart(filters);
      } else {
        document.getElementById('overview-section').classList.add('hidden');
        document.getElementById('detail-section').classList.remove('hidden');
        renderByGzChart(filtered);
        renderByCauseChart(filtered);
        renderByWorkChart(filtered);
        renderHeatmap(filtered);
        renderTable(filtered);
      }
    }

    function renderSummaryCards(data, selectedDT) {
      const container = document.getElementById('summary-cards');
      const filters = fm.getAll();
      const baseData = getBaseData();
      const total = baseData.length;

      if (!selectedDT && !filters['기인물']) {
        const dtMap = {};
        baseData.forEach(r => { const dt = r['재해형태']; if (dt) dtMap[dt] = (dtMap[dt] || 0) + 1; });
        const dtCount = Object.keys(dtMap).length;
        const topDT = Object.entries(dtMap).sort((a, b) => b[1] - a[1])[0];
        container.innerHTML = `
          <div class="stat-card">
            <p class="text-xs text-gray-500">총 재해건수</p>
            <p class="text-2xl font-bold text-white">${formatNumber(total)}건</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">재해형태 수</p>
            <p class="text-2xl font-bold text-blue-400">${dtCount}개</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">최다 재해형태</p>
            <p class="text-lg font-bold text-amber-400">${topDT ? topDT[0] : '-'}</p>
            <p class="text-xs text-gray-500">${topDT ? formatNumber(topDT[1]) + '건 (' + formatPercent(topDT[1], total) + ')' : ''}</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">상위 3개 비중</p>
            <p class="text-2xl font-bold text-red-400">${(() => {
              const top3 = Object.entries(dtMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
              const sum = top3.reduce((s,e)=>s+e[1],0);
              return formatPercent(sum, total);
            })()}</p>
          </div>
        `;
      } else {
        const gzCount = new Set(data.map(r => r['공종'])).size;
        const causeCount = new Set(data.map(r => r['기인물'])).size;
        const dtCount = new Set(data.map(r => r['재해형태'])).size;
        const dtLabel = Array.isArray(selectedDT) ? (selectedDT.length === 1 ? selectedDT[0] : `${selectedDT.length}개 재해형태`) : selectedDT;
        const causeLabel = filters['기인물'] ? (Array.isArray(filters['기인물']) ? (filters['기인물'].length === 1 ? filters['기인물'][0] : `${filters['기인물'].length}개 기인물`) : filters['기인물']) : null;
        const label = dtLabel || causeLabel || '선택 조건';
        container.innerHTML = `
          <div class="stat-card">
            <p class="text-xs text-gray-500">선택 조건</p>
            <p class="text-lg font-bold text-white truncate" title="${label}">${label}</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">조회 건수</p>
            <p class="text-2xl font-bold text-red-400">${formatNumber(data.length)}건</p>
            <p class="text-xs text-gray-500">전체 대비 ${formatPercent(data.length, total)}</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">관련 공종</p>
            <p class="text-2xl font-bold text-blue-400">${gzCount}개</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">${selectedDT ? '관련 기인물' : '관련 재해형태'}</p>
            <p class="text-2xl font-bold text-amber-400">${selectedDT ? causeCount : dtCount}개</p>
          </div>
        `;
      }
    }

    function renderOverviewChart(filters) {
      let data = getBaseData();

      const dtMap = {};
      data.forEach(r => { const dt = r['재해형태']; if (dt) dtMap[dt] = (dtMap[dt] || 0) + 1; });
      const sorted = Object.entries(dtMap).sort((a, b) => b[1] - a[1]);
      const total = data.length;

      cm.create('chart-overview', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a[0]),
          datasets: [{
            data: sorted.map(a => a[1]),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: {
            legend: { display: false },
            datalabels: {
              display: true, anchor: 'end', align: 'right',
              color: '#9CA3AF', font: { size: 10 },
              formatter: (val) => `${val.toLocaleString()}건 (${(val/total*100).toFixed(1)}%)`,
            }
          },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 11 } } }
          },
          onClick: (e, elements) => {
            if (elements.length > 0) {
              const idx = elements[0].index;
              const dt = sorted[idx][0];
              msDisaster.setValues([dt]);
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    function renderByGzChart(data) {
      const agg = aggregateBy(data, '공종');
      const sorted = topN(agg, 'count', 12);
      const total = data.length;

      cm.create('chart-by-gz', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a.key.replace(/^\d+\.\s*/, '')),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: {
            legend: { display: false },
            datalabels: {
              display: true, anchor: 'end', align: 'right',
              color: '#9CA3AF', font: { size: 9 },
              formatter: (val) => `${val}건 (${(val/total*100).toFixed(1)}%)`,
            }
          },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 10 } } }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    function renderByCauseChart(data) {
      const agg = aggregateBy(data, '기인물');
      const limit = showAllCause ? agg.length : 15;
      const sorted = topN(agg, 'count', limit);
      const total = data.length;
      const height = showAllCause ? Math.max(350, sorted.length * 22) : 350;

      document.getElementById('cause-chart-title').textContent =
        showAllCause ? `기인물별 사고건수 (전체 ${agg.length}개)` : '기인물별 사고건수 (Top 15)';
      document.getElementById('chart-cause-wrap').style.height = height + 'px';

      cm.create('chart-by-cause', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a.key),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            datalabels: {
              display: true, anchor: 'end', align: 'right',
              color: '#9CA3AF', font: { size: 9 },
              formatter: (val) => `${val}건 (${(val/total*100).toFixed(1)}%)`,
            }
          },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 9 }, autoSkip: false } }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    function renderByWorkChart(data) {
      const agg = aggregateBy(data, '작업명');
      const limit = showAllWork ? agg.length : 15;
      const sorted = topN(agg, 'count', limit);
      const total = data.length;
      const height = showAllWork ? Math.max(400, sorted.length * 22) : 400;

      document.getElementById('work-chart-title').textContent =
        showAllWork ? `작업명별 사고건수 (전체 ${agg.length}개)` : '작업명별 사고건수 (Top 15)';
      document.getElementById('chart-work-wrap').style.height = height + 'px';

      cm.create('chart-by-work', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a.key),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 9 }, autoSkip: false } }
          }
        }
      });
    }

    function renderHeatmap(data) {
      const gzList = [...new Set(data.map(r => r['공종']))].sort();
      const classTotal = {};
      data.forEach(r => { const cc = r['기인물분류']; if (cc) classTotal[cc] = (classTotal[cc] || 0) + 1; });
      const sortedClasses = Object.entries(classTotal).sort((a, b) => b[1] - a[1]).map(a => a[0]);

      if (sortedClasses.length === 0 || gzList.length === 0) {
        document.getElementById('heatmap-gz-cause-class').innerHTML = '<p class="text-gray-500 text-sm">데이터 없음</p>';
        return;
      }

      const matrix = {};
      let maxVal = 0;
      gzList.forEach(gz => { matrix[gz] = {}; sortedClasses.forEach(cc => { matrix[gz][cc] = 0; }); });
      data.forEach(r => {
        const gz = r['공종'], cc = r['기인물분류'];
        if (gz && cc && matrix[gz] && matrix[gz][cc] !== undefined) {
          matrix[gz][cc]++;
          maxVal = Math.max(maxVal, matrix[gz][cc]);
        }
      });

      let html = `<table class="w-full text-xs"><thead><tr><th class="px-2 py-1 text-left text-gray-500 sticky left-0 bg-gray-900 z-10"></th>`;
      sortedClasses.forEach(cc => {
        html += `<th class="px-2 py-1 text-center text-gray-400 font-normal whitespace-nowrap" style="writing-mode:vertical-lr;min-width:28px">${cc}</th>`;
      });
      html += `</tr></thead><tbody>`;

      gzList.forEach(gz => {
        const shortName = gz.replace(/^\d+\.\s*/, '');
        html += `<tr><td class="px-2 py-1.5 text-gray-400 whitespace-nowrap sticky left-0 bg-gray-900 z-10">${shortName}</td>`;
        sortedClasses.forEach(cc => {
          const val = matrix[gz][cc];
          const bg = val === 0 ? 'rgba(31,41,55,0.3)' : CHART_COLORS.heatmapColor(val, 0, maxVal);
          html += `<td class="px-2 py-1.5 text-center font-medium text-xs" style="background:${bg}" title="${shortName} - ${cc}: ${val}건">${val || ''}</td>`;
        });
        html += `</tr>`;
      });
      html += `</tbody></table>`;
      document.getElementById('heatmap-gz-cause-class').innerHTML = html;
    }

    function renderTable(data) {
      const sorted = [...data].sort((a, b) => (a['위험도순위'] || 999) - (b['위험도순위'] || 999));
      const columns = [
        { key: '위험도순위', label: '위험도', width: 50 },
        { key: '공종', label: '공종', width: 80, wrap: true,
          format: (v) => v ? v.replace(/^\d+\.\s*/, '') : '-' },
        { key: '작업명', label: '작업명', width: 110, wrap: true },
        { key: '단위작업명', label: '단위작업명', width: 110, wrap: true },
        { key: '기인물', label: '기인물', width: 90, wrap: true },
        { key: '재해형태', label: '재해형태', width: 70 },
        { key: '재해개요', label: '재해개요', minWidth: 220, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '재해유발요인', label: '재해유발요인', minWidth: 180, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '위험성감소대책', label: '감소대책', minWidth: 180, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
      ];
      buildTable('data-table', columns, sorted, {
        pageSize: 10,
        filterColumns: ['공종', '작업명', '단위작업명', '기인물', '재해형태']
      });
    }

    init();
  </script>
</body>
</html>
