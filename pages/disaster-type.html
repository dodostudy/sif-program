<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIF 건설재해 위험성평가 - 재해형태 분석</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    @media (max-width: 767px) {
      .filter-bar { flex-direction: column; gap: 0.5rem; }
      .filter-group { width: 100%; }
      .filter-group select { width: 100%; min-width: 0; }
      .filter-group label { min-width: auto; }
      #btn-reset { width: 100%; }
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div id="sidebar"></div>

  <main id="content" class="p-4 lg:p-6">
    <div id="page-header"></div>

    <!-- 필터 바 -->
    <div class="filter-bar mb-4">
      <div class="filter-group">
        <label>재해형태</label>
        <select id="filter-disaster"></select>
      </div>
      <div class="filter-group" id="koen-toggle-wrap"></div>
      <div class="filter-group">
        <label>공종</label>
        <select id="filter-gz"></select>
      </div>
      <button id="btn-reset" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg transition-colors">초기화</button>
    </div>

    <!-- 요약 카드 -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4" id="summary-cards"></div>

    <!-- 전체 요약 바 차트 (재해형태 미선택 시) -->
    <div id="overview-section" class="chart-container mb-4">
      <h3 class="text-sm font-semibold text-gray-300 mb-3">재해형태별 사고건수</h3>
      <div style="height:400px"><canvas id="chart-overview"></canvas></div>
    </div>

    <!-- 상세 분석 영역 (재해형태 선택 시) -->
    <div id="detail-section" class="hidden">
      <!-- 공종별 / 기인물별 분포 -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <div class="chart-container">
          <h3 class="text-sm font-semibold text-gray-300 mb-3">공종별 사고건수</h3>
          <div style="height:350px"><canvas id="chart-by-gz"></canvas></div>
        </div>
        <div class="chart-container">
          <h3 class="text-sm font-semibold text-gray-300 mb-3">기인물별 사고건수 (Top 15)</h3>
          <div style="height:350px"><canvas id="chart-by-cause"></canvas></div>
        </div>
      </div>

      <!-- 작업명별 분포 -->
      <div class="grid grid-cols-1 xl:grid-cols-3 gap-4 mb-4">
        <div class="chart-container">
          <h3 class="text-sm font-semibold text-gray-300 mb-3">작업명별 사고건수 (Top 15)</h3>
          <div style="height:400px"><canvas id="chart-by-work"></canvas></div>
        </div>
        <div class="xl:col-span-2 chart-container">
          <h3 class="text-sm font-semibold text-gray-300 mb-3">공종 × 기인물분류 히트맵</h3>
          <div id="heatmap-gz-cause-class" class="overflow-x-auto" style="max-height:400px"></div>
        </div>
      </div>

      <!-- 재해사례 테이블 -->
      <div class="chart-container">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">재해사례 및 예방대책</h3>
        <div id="data-table"></div>
      </div>
    </div>
  </main>

  <script src="../js/data-loader.js"></script>
  <script src="../js/filter-manager.js"></script>
  <script src="../js/chart-manager.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/app.js"></script>

  <script>
    const cm = new ChartManager();
    const fm = new FilterManager(['재해형태', 'koen', '공종']);
    fm.setDownstream('재해형태', ['공종']);

    let allData = [];
    let disasterCountMap = {};

    async function init() {
      renderPageHeader('재해형태 분석', '재해형태 기준 역방향 조회 - 해당 재해형태가 발생하는 공정·기인물 분석');

      allData = await DataLoader.loadDB();

      // 전체 재해형태별 건수 맵
      allData.forEach(r => {
        const dt = r['재해형태'];
        if (dt) disasterCountMap[dt] = (disasterCountMap[dt] || 0) + 1;
      });

      setupFilters();
      renderResults();
    }

    function setupFilters() {
      // 재해형태 드롭다운 (건수 내림차순)
      const dtSelect = document.getElementById('filter-disaster');
      const sortedTypes = Object.entries(disasterCountMap)
        .sort((a, b) => b[1] - a[1]);

      dtSelect.innerHTML = '<option value="">전체 재해형태</option>';
      sortedTypes.forEach(([dt, count]) => {
        const opt = document.createElement('option');
        opt.value = dt;
        opt.textContent = `${dt} (${count.toLocaleString()}건)`;
        dtSelect.appendChild(opt);
      });

      // 발전소 공정 토글
      createKoenToggle('koen-toggle-wrap', (val) => fm.set('koen', val));

      // 공종 드롭다운 (초기 비어있음)
      populateDropdown('filter-gz', [], '공종 선택');

      // 이벤트
      dtSelect.addEventListener('change', (e) => {
        fm.set('재해형태', e.target.value || null);
      });

      document.getElementById('filter-gz').addEventListener('change', (e) => {
        fm.set('공종', e.target.value || null);
      });

      // 재해형태 변경 시 공종 드롭다운 갱신
      fm.subscribe('재해형태', () => updateGzDropdown());
      fm.subscribe('koen', () => updateGzDropdown());

      document.getElementById('btn-reset').addEventListener('click', () => {
        fm.reset();
        dtSelect.value = '';
        document.getElementById('filter-gz').value = '';
        const koenToggle = document.getElementById('koen-toggle');
        if (koenToggle) {
          koenToggle.checked = false;
          document.getElementById('koen-label').textContent = '전체';
        }
      });

      fm.onDataChange(() => renderResults());
    }

    function updateGzDropdown() {
      const filters = fm.getAll();
      let data = [...allData];
      if (filters.koen === true) data = data.filter(r => r.KOEN공정);
      if (filters['재해형태']) data = data.filter(r => r['재해형태'] === filters['재해형태']);

      const gzCounts = {};
      data.forEach(r => {
        const gz = r['공종'];
        if (gz) gzCounts[gz] = (gzCounts[gz] || 0) + 1;
      });
      const sorted = Object.entries(gzCounts).sort((a, b) => b[1] - a[1]);

      const select = document.getElementById('filter-gz');
      const current = select.value;
      select.innerHTML = '<option value="">공종 선택</option>';
      sorted.forEach(([gz, count]) => {
        const opt = document.createElement('option');
        opt.value = gz;
        opt.textContent = `${gz.replace(/^\d+\.\s*/, '')} (${count}건)`;
        select.appendChild(opt);
      });
      if (current && sorted.some(([gz]) => gz === current)) select.value = current;
    }

    function renderResults() {
      const filters = fm.getAll();
      const filtered = filterDB(allData, filters);
      const selectedDT = filters['재해형태'];

      renderSummaryCards(filtered, selectedDT);

      if (!selectedDT) {
        document.getElementById('overview-section').classList.remove('hidden');
        document.getElementById('detail-section').classList.add('hidden');
        renderOverviewChart();
      } else {
        document.getElementById('overview-section').classList.add('hidden');
        document.getElementById('detail-section').classList.remove('hidden');
        renderByGzChart(filtered);
        renderByCauseChart(filtered);
        renderByWorkChart(filtered);
        renderHeatmap(filtered);
        renderTable(filtered);
      }
    }

    function renderSummaryCards(data, selectedDT) {
      const container = document.getElementById('summary-cards');
      const total = allData.length;

      if (!selectedDT) {
        const dtCount = Object.keys(disasterCountMap).length;
        const topDT = Object.entries(disasterCountMap).sort((a, b) => b[1] - a[1])[0];
        container.innerHTML = `
          <div class="stat-card">
            <p class="text-xs text-gray-500">총 재해건수</p>
            <p class="text-2xl font-bold text-white">${formatNumber(total)}건</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">재해형태 수</p>
            <p class="text-2xl font-bold text-blue-400">${dtCount}개</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">최다 재해형태</p>
            <p class="text-lg font-bold text-amber-400">${topDT ? topDT[0] : '-'}</p>
            <p class="text-xs text-gray-500">${topDT ? formatNumber(topDT[1]) + '건 (' + formatPercent(topDT[1], total) + ')' : ''}</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">상위 3개 재해형태 비중</p>
            <p class="text-2xl font-bold text-red-400">${(() => {
              const top3 = Object.entries(disasterCountMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
              const sum = top3.reduce((s,e)=>s+e[1],0);
              return formatPercent(sum, total);
            })()}</p>
          </div>
        `;
      } else {
        const dtTotal = disasterCountMap[selectedDT] || 0;
        const gzCount = new Set(data.map(r => r['공종'])).size;
        const causeCount = new Set(data.map(r => r['기인물'])).size;
        container.innerHTML = `
          <div class="stat-card">
            <p class="text-xs text-gray-500">선택 재해형태</p>
            <p class="text-lg font-bold text-white">${selectedDT}</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">해당 건수</p>
            <p class="text-2xl font-bold text-red-400">${formatNumber(data.length)}건</p>
            <p class="text-xs text-gray-500">전체 대비 ${formatPercent(dtTotal, total)}</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">관련 공종 수</p>
            <p class="text-2xl font-bold text-blue-400">${gzCount}개</p>
          </div>
          <div class="stat-card">
            <p class="text-xs text-gray-500">관련 기인물 수</p>
            <p class="text-2xl font-bold text-amber-400">${causeCount}개</p>
          </div>
        `;
      }
    }

    function renderOverviewChart() {
      const sorted = Object.entries(disasterCountMap).sort((a, b) => b[1] - a[1]);
      const total = allData.length;

      const chart = cm.create('chart-overview', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a[0]),
          datasets: [{
            data: sorted.map(a => a[1]),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: {
            legend: { display: false },
            datalabels: {
              display: true, anchor: 'end', align: 'right',
              color: '#9CA3AF', font: { size: 10 },
              formatter: (val) => `${val.toLocaleString()}건 (${(val/total*100).toFixed(1)}%)`,
            }
          },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 11 } } }
          },
          onClick: (e, elements) => {
            if (elements.length > 0) {
              const idx = elements[0].index;
              const dt = sorted[idx][0];
              document.getElementById('filter-disaster').value = dt;
              fm.set('재해형태', dt);
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    function renderByGzChart(data) {
      const agg = aggregateBy(data, '공종');
      const sorted = topN(agg, 'count', 12);
      const total = data.length;

      cm.create('chart-by-gz', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a.key.replace(/^\d+\.\s*/, '')),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: {
            legend: { display: false },
            datalabels: {
              display: true, anchor: 'end', align: 'right',
              color: '#9CA3AF', font: { size: 9 },
              formatter: (val) => `${val}건 (${(val/total*100).toFixed(1)}%)`,
            }
          },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 10 } } }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    function renderByCauseChart(data) {
      const agg = aggregateBy(data, '기인물');
      const sorted = topN(agg, 'count', 15);
      const total = data.length;

      cm.create('chart-by-cause', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a.key),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: {
            legend: { display: false },
            datalabels: {
              display: true, anchor: 'end', align: 'right',
              color: '#9CA3AF', font: { size: 9 },
              formatter: (val) => `${val}건 (${(val/total*100).toFixed(1)}%)`,
            }
          },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 9 }, autoSkip: false } }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    function renderByWorkChart(data) {
      const agg = aggregateBy(data, '작업명');
      const sorted = topN(agg, 'count', 15);

      cm.create('chart-by-work', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a.key),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 9 }, autoSkip: false } }
          }
        }
      });
    }

    function renderHeatmap(data) {
      const gzList = [...new Set(data.map(r => r['공종']))].sort();
      const causeClassList = [...new Set(data.map(r => r['기인물분류']).filter(Boolean))];

      // 기인물분류별 건수로 정렬
      const classTotal = {};
      data.forEach(r => {
        const cc = r['기인물분류'];
        if (cc) classTotal[cc] = (classTotal[cc] || 0) + 1;
      });
      const sortedClasses = Object.entries(classTotal).sort((a, b) => b[1] - a[1]).map(a => a[0]);

      if (sortedClasses.length === 0 || gzList.length === 0) {
        document.getElementById('heatmap-gz-cause-class').innerHTML = '<p class="text-gray-500 text-sm">데이터 없음</p>';
        return;
      }

      // 교차집계
      const matrix = {};
      let maxVal = 0;
      gzList.forEach(gz => {
        matrix[gz] = {};
        sortedClasses.forEach(cc => { matrix[gz][cc] = 0; });
      });
      data.forEach(r => {
        const gz = r['공종'];
        const cc = r['기인물분류'];
        if (gz && cc && matrix[gz] && matrix[gz][cc] !== undefined) {
          matrix[gz][cc]++;
          maxVal = Math.max(maxVal, matrix[gz][cc]);
        }
      });

      let html = `<table class="w-full text-xs"><thead><tr><th class="px-2 py-1 text-left text-gray-500 sticky left-0 bg-gray-900 z-10"></th>`;
      sortedClasses.forEach(cc => {
        html += `<th class="px-2 py-1 text-center text-gray-400 font-normal whitespace-nowrap" style="writing-mode:vertical-lr;min-width:28px">${cc}</th>`;
      });
      html += `</tr></thead><tbody>`;

      gzList.forEach(gz => {
        const shortName = gz.replace(/^\d+\.\s*/, '');
        html += `<tr><td class="px-2 py-1.5 text-gray-400 whitespace-nowrap sticky left-0 bg-gray-900 z-10">${shortName}</td>`;
        sortedClasses.forEach(cc => {
          const val = matrix[gz][cc];
          const bg = val === 0 ? 'rgba(31,41,55,0.3)' : CHART_COLORS.heatmapColor(val, 0, maxVal);
          html += `<td class="px-2 py-1.5 text-center font-medium text-xs" style="background:${bg}" title="${shortName} - ${cc}: ${val}건">${val || ''}</td>`;
        });
        html += `</tr>`;
      });
      html += `</tbody></table>`;
      document.getElementById('heatmap-gz-cause-class').innerHTML = html;
    }

    function renderTable(data) {
      const sorted = [...data].sort((a, b) => (a['위험도순위'] || 999) - (b['위험도순위'] || 999));
      const columns = [
        { key: '위험도순위', label: '위험도', maxWidth: 60 },
        { key: '공종', label: '공종', maxWidth: 120,
          format: (v) => v ? v.replace(/^\d+\.\s*/, '') : '-' },
        { key: '작업명', label: '작업명', maxWidth: 150 },
        { key: '단위작업명', label: '단위작업명', maxWidth: 150 },
        { key: '기인물', label: '기인물', maxWidth: 120 },
        { key: '재해개요', label: '재해개요', maxWidth: 350, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '재해유발요인', label: '재해유발요인', maxWidth: 250, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '위험성감소대책', label: '위험성감소대책', maxWidth: 300, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
      ];
      buildTable('data-table', columns, sorted, { pageSize: 10 });
    }

    init();
  </script>
</body>
</html>
