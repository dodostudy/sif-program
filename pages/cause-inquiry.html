<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIF 건설재해 위험성평가 - 기인물조회</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 모바일 필터 최적화 */
    @media (max-width: 767px) {
      .filter-bar { flex-direction: column; gap: 0.5rem; }
      .filter-group { width: 100%; }
      .filter-group select, .ms-dropdown { width: 100%; min-width: 0; }
      .filter-group label { min-width: auto; }
      #btn-reset { width: 100%; }
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div id="sidebar"></div>

  <main id="content" class="p-4 lg:p-6">
    <div id="page-header"></div>

    <!-- 필터 바 -->
    <div class="filter-bar mb-4">
      <div class="filter-group" id="cause-koen-wrap"></div>
      <div class="filter-group">
        <label>작업유형</label>
        <div id="ms-worktype"></div>
      </div>
      <div class="filter-group">
        <label>12대 기인물</label>
        <div class="flex items-center gap-2 bg-gray-800 rounded-lg px-3 py-2">
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="filter-12-toggle" class="sr-only peer">
            <div class="w-9 h-5 bg-gray-600 rounded-full peer peer-checked:bg-purple-600 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
          </label>
          <span class="text-xs text-gray-400" id="filter-12-label">전체</span>
        </div>
      </div>
      <div class="filter-group">
        <label>기인물</label>
        <div id="ms-cause"></div>
      </div>
      <button id="btn-reset" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg transition-colors">초기화</button>
    </div>
    <div id="keyword-search-wrap" class="mb-4"></div>

    <!-- 선택된 기인물 요약 -->
    <div id="cause-summary" class="mb-4 hidden">
      <div class="chart-container">
        <div class="flex flex-wrap items-center gap-4">
          <div>
            <p class="text-xs text-gray-500">선택 기인물</p>
            <p class="text-xl font-bold text-white" id="cause-name">-</p>
          </div>
          <div>
            <p class="text-xs text-gray-500">총 사고건수</p>
            <p class="text-xl font-bold text-red-400" id="cause-count">-</p>
          </div>
          <div>
            <p class="text-xs text-gray-500">전체 순위</p>
            <p class="text-xl font-bold text-amber-400" id="cause-rank">-</p>
          </div>
          <div id="cause-badge-12"></div>
        </div>
      </div>
    </div>

    <!-- 차트: 공종별 + 재해형태별 + 작업명별 한 행 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
      <div class="chart-container">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">공종별 사고건수</h3>
        <div style="height:300px"><canvas id="chart-by-construction"></canvas></div>
      </div>
      <div class="chart-container">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">재해형태별 건수</h3>
        <div style="height:300px"><canvas id="chart-by-disaster"></canvas></div>
      </div>
      <div class="chart-container">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">작업명별 사고건수</h3>
        <div style="height:300px"><canvas id="chart-by-work"></canvas></div>
      </div>
    </div>

    <!-- 재해사례 목록 (풀폭) -->
    <div class="chart-container">
      <h3 class="text-sm font-semibold text-gray-300 mb-3">재해사례 목록</h3>
      <div id="data-table"></div>
    </div>
  </main>

  <script src="../js/data-loader.js"></script>
  <script src="../js/filter-manager.js"></script>
  <script src="../js/chart-manager.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/multi-select.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/app.js"></script>

  <script>
    // WORK_TYPE_MAP은 js/utils.js에서 전역 선언됨

    const cm = new ChartManager();
    const fm = new FilterManager(['koen', '작업유형', '12대기인물', '기인물', 'keyword']);
    let isMilpeActive = false; // 밀폐 특수 필터 상태
    fm.setDownstream('작업유형', ['기인물']);
    fm.setDownstream('12대기인물', ['기인물']);

    let allData = [];
    let dropdownRef = {};
    let causeCountMap = {};

    // 멀티셀렉트 인스턴스
    const msWorkType = new MultiSelect({
      containerId: 'ms-worktype',
      placeholder: '전체',
      showCounts: true,
      onChange: (values) => {
        if (!values || values.length === 0) {
          isMilpeActive = false;
          fm.set('작업유형', null);
          return;
        }
        isMilpeActive = values.includes('밀폐');
        // 선택된 유형들의 기인물 합집합
        const allCauses = [];
        values.forEach(type => {
          if (type !== '밀폐' && WORK_TYPE_MAP[type]) {
            allCauses.push(...WORK_TYPE_MAP[type]);
          }
        });
        fm.set('작업유형', allCauses.length > 0 ? [...new Set(allCauses)] : null);
      }
    });

    const msCause = new MultiSelect({
      containerId: 'ms-cause',
      placeholder: '기인물 선택',
      showCounts: true,
      onChange: (values) => fm.set('기인물', values)
    });

    let keywordInput = null;

    async function init() {
      renderPageHeader('기인물조회', '기인물 기준 역방향 조회 - 해당 기인물이 어떤 공정에서 위험한지 분석');

      allData = await DataLoader.loadDB();
      dropdownRef = await DataLoader.loadDropdownRef();

      // 전체 건수 맵 구축
      allData.forEach(r => {
        const c = r['기인물'];
        if (c) causeCountMap[c] = (causeCountMap[c] || 0) + 1;
      });

      // 발전소 공정 토글
      createKoenToggle('cause-koen-wrap', (val) => fm.set('koen', val));

      // 키워드 검색
      keywordInput = createKeywordSearch('keyword-search-wrap', (val) => fm.set('keyword', val));

      setupFilters();
      renderResults();
    }

    function setupFilters() {
      const allCauses = (dropdownRef['기인물목록'] || []);
      const milpeCount = allData.filter(r => r['재해형태'] === '산소결핍 질식').length;

      // 작업유형 멀티셀렉트 옵션
      const workTypeOptions = Object.keys(WORK_TYPE_MAP).map(type => {
        const causeList = WORK_TYPE_MAP[type];
        const count = causeList === null
          ? milpeCount
          : (causeList || []).reduce((sum, c) => sum + (causeCountMap[c] || 0), 0);
        return { value: type, label: type, count: count };
      });
      msWorkType.setOptions(workTypeOptions);

      // 초기 기인물 멀티셀렉트
      updateCauseDropdown();

      // 12대기인물 토글
      document.getElementById('filter-12-toggle').addEventListener('change', (e) => {
        document.getElementById('filter-12-label').textContent = e.target.checked ? '12대만' : '전체';
        fm.set('12대기인물', e.target.checked ? true : null);
      });

      // 작업유형 변경 시 기인물 갱신
      fm.subscribe('작업유형', () => {
        updateCauseDropdown();
        msCause.clear();
      });

      // 12대 기인물 선택 시 기인물 갱신
      fm.subscribe('12대기인물', () => {
        updateCauseDropdown();
        msCause.clear();
      });

      // KOEN 변경 시 기인물 갱신
      fm.subscribe('koen', () => {
        causeCountMap = {};
        const baseData = fm.get('koen') === true ? allData.filter(r => r.KOEN공정) : allData;
        baseData.forEach(r => { const c = r['기인물']; if (c) causeCountMap[c] = (causeCountMap[c] || 0) + 1; });
        updateCauseDropdown();
        msCause.clear();
      });

      // 초기화
      document.getElementById('btn-reset').addEventListener('click', () => {
        fm.reset();
        isMilpeActive = false;
        const toggle12 = document.getElementById('filter-12-toggle');
        if (toggle12) { toggle12.checked = false; document.getElementById('filter-12-label').textContent = '전체'; }
        const koenToggle = document.getElementById('cause-koen-wrap-toggle');
        if (koenToggle) { koenToggle.checked = false; document.getElementById('cause-koen-wrap-label').textContent = '전체'; }
        if (keywordInput) keywordInput.value = '';
        msWorkType.clear();
        msCause.clear();
        causeCountMap = {};
        allData.forEach(r => { const c = r['기인물']; if (c) causeCountMap[c] = (causeCountMap[c] || 0) + 1; });
        msWorkType.setOptions(workTypeOptions);
        updateCauseDropdown();
      });

      fm.onDataChange(() => renderResults());
    }

    function updateCauseDropdown() {
      const allCauses = dropdownRef['기인물목록'] || [];
      const is12List = dropdownRef['12대기인물'] || [];
      const workTypeVal = fm.get('작업유형');
      const is12Val = fm.get('12대기인물');

      let candidates = [...allCauses];

      if (isMilpeActive) {
        const milpeCauses = [...new Set(
          allData.filter(r => r['재해형태'] === '산소결핍 질식').map(r => r['기인물']).filter(Boolean)
        )];
        candidates = candidates.filter(c => milpeCauses.includes(c));
      } else if (workTypeVal && Array.isArray(workTypeVal)) {
        candidates = candidates.filter(c => workTypeVal.includes(c));
      }

      if (is12Val === true) {
        candidates = candidates.filter(c => is12List.includes(c));
      }

      const sorted = [...candidates].sort((a, b) => (causeCountMap[b] || 0) - (causeCountMap[a] || 0));
      msCause.setOptions(sorted.map(c => ({
        value: c,
        label: c,
        count: causeCountMap[c] || 0
      })));
    }

    function renderResults() {
      const filters = fm.getAll();
      let filtered = filterDB(allData, filters);

      if (isMilpeActive) {
        filtered = filtered.filter(r => r['재해형태'] === '산소결핍 질식');
      }

      renderCauseSummary(filtered, filters);
      renderByConstructionChart(filtered);
      renderByDisasterChart(filtered);
      renderByWorkChart(filtered);
      renderTable(filtered);
    }

    function renderCauseSummary(data, filters) {
      const summary = document.getElementById('cause-summary');
      const selectedCause = filters['기인물'];

      if (!selectedCause) {
        summary.classList.add('hidden');
        return;
      }
      summary.classList.remove('hidden');

      const causeList = Array.isArray(selectedCause) ? selectedCause : [selectedCause];

      if (causeList.length === 1) {
        const cause = causeList[0];
        const allAgg = aggregateBy(allData, '기인물');
        const sorted = topN(allAgg, 'count', allAgg.length);
        const rank = sorted.findIndex(a => a.key === cause) + 1;
        const is12 = (dropdownRef['12대기인물'] || []).includes(cause);

        document.getElementById('cause-name').textContent = cause;
        document.getElementById('cause-count').textContent = formatNumber(data.length) + '건';
        document.getElementById('cause-rank').textContent = rank ? `${rank}위 / ${sorted.length}개` : '-';
        document.getElementById('cause-badge-12').innerHTML = is12
          ? '<span class="badge-12">12대 기인물 (중점관리대상)</span>'
          : '';
      } else {
        document.getElementById('cause-name').textContent = `${causeList.length}개 기인물 선택`;
        document.getElementById('cause-count').textContent = formatNumber(data.length) + '건';
        document.getElementById('cause-rank').textContent = '-';
        document.getElementById('cause-badge-12').innerHTML = '';
      }
    }

    function renderByConstructionChart(data) {
      const agg = aggregateBy(data, '공종');
      const sorted = topN(agg, 'count', 12);

      cm.create('chart-by-construction', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a.key.replace(/^\d+\.\s*/, '')),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 10 } } }
          }
        }
      });
    }

    function renderByDisasterChart(data) {
      const agg = aggregateBy(data, '재해형태');
      const sorted = topN(agg, 'count', 10);

      cm.create('chart-by-disaster', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a.key),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 10 } } }
          }
        }
      });
    }

    function renderByWorkChart(data) {
      const agg = aggregateBy(data, '작업명');
      const sorted = topN(agg, 'count', 10);

      cm.create('chart-by-work', {
        type: 'bar',
        data: {
          labels: sorted.map(a => a.key),
          datasets: [{
            data: sorted.map(a => a.count),
            backgroundColor: sorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: sorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#1F2937' } },
            y: { grid: { display: false }, ticks: { font: { size: 9 }, autoSkip: false } }
          }
        }
      });
    }

    function renderTable(data) {
      const columns = [
        { key: 'id', label: 'No', width: 40 },
        { key: '공종', label: '공종', width: 80, wrap: true,
          format: (v) => v ? v.replace(/^\d+\.\s*/, '') : '-' },
        { key: '작업명', label: '작업명', width: 100, wrap: true },
        { key: '재해형태', label: '재해형태', width: 70 },
        { key: '재해개요', label: '재해개요', minWidth: 250, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '위험성감소대책', label: '감소대책', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
      ];
      buildTable('data-table', columns, data, {
        pageSize: 10,
        filterColumns: ['공종', '작업명', '재해형태']
      });
    }

    init();
  </script>
</body>
</html>
