<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIF 건설재해 위험성평가 - 위험성평가 지원</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div id="sidebar"></div>

  <main id="content" class="p-4 lg:p-6">
    <div id="page-header"></div>

    <!-- 인쇄용 헤더 -->
    <div class="print-header" id="print-title"></div>

    <!-- ===== 진입 카드 ===== -->
    <div id="entry-cards" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="entry-card" onclick="showSection('gpts')">
        <div class="entry-icon">&#129302;</div>
        <p class="entry-title">AI GPTs 안전누리</p>
        <p class="entry-desc">대화형 7단계 위험성평가</p>
      </div>
      <div class="entry-card" onclick="showSection('power')">
        <div class="entry-icon">&#9889;</div>
        <p class="entry-title">발전업</p>
        <p class="entry-desc">기인물 기반 위험성평가</p>
      </div>
      <div class="entry-card" onclick="showSection('construction')">
        <div class="entry-icon">&#127959;</div>
        <p class="entry-title">건설업</p>
        <p class="entry-desc">공종 기반 위험성평가</p>
      </div>
    </div>

    <!-- ===== GPTs 섹션 ===== -->
    <div id="gpts-section" class="hidden">
      <div class="flex items-center gap-2 mb-4">
        <button class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="goHome()">&#8592; 처음으로</button>
        <span class="text-sm text-gray-400">AI GPTs 안전누리</span>
      </div>
      <div class="mb-5 rounded-2xl border border-blue-700/40 p-5" style="background:linear-gradient(135deg,rgba(15,30,80,.7) 0%,rgba(13,31,92,.5) 100%);backdrop-filter:blur(12px)">
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
          <div class="flex items-center gap-3 flex-shrink-0">
            <div class="w-10 h-10 rounded-xl bg-blue-600/30 border border-blue-500/40 flex items-center justify-center">
              <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
              </svg>
            </div>
            <div>
              <div class="flex items-center gap-2 mb-0.5">
                <span class="text-xs font-bold text-blue-300 uppercase tracking-widest">특허출원</span>
              </div>
              <p class="text-sm font-black text-white leading-tight">AI GPTs 안전누리</p>
            </div>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm text-blue-100 leading-tight">대화하듯 질문에 답하면 7단계로 위험성평가가 완성됩니다</p>
          </div>
          <div class="flex gap-2 flex-shrink-0">
            <a href="https://chatgpt.com/g/g-68d9ea4687d881919dc5d8c7aa65c776-bundang-anjeonnuri-koen-for-wiheomseongpyeongga"
               target="_blank" rel="noopener noreferrer"
               class="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-500 text-white font-semibold px-4 py-2 rounded-xl text-xs transition-all hover:shadow-lg hover:shadow-blue-900/60 whitespace-nowrap">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              GPTs 열기
            </a>
            <a href="https://app.guidde.com/share/playbooks/hr8GgLUK3uJ3MgnkuecH9V?origin=WsIqNikVeiZSE6b1baGljoCN5EH3"
               target="_blank" rel="noopener noreferrer"
               class="flex items-center gap-1.5 border border-white/20 hover:border-white/40 text-gray-300 hover:text-white font-semibold px-4 py-2 rounded-xl text-xs transition-all bg-white/5 hover:bg-white/10 whitespace-nowrap">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              사용방법
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== 발전업 섹션 ===== -->
    <div id="power-section" class="hidden">
      <div class="flex items-center gap-2 mb-4 no-print">
        <button class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="goHome()">&#8592; 처음으로</button>
        <span class="text-sm text-gray-400" id="power-breadcrumb">발전업 위험성평가</span>
      </div>

      <!-- 발전소공정 토글 -->
      <div class="mb-4 no-print" id="power-koen-wrap"></div>

      <!-- Step 1: 기인물 선택 -->
      <div id="power-step1"></div>
      <!-- Step 2: 재해형태 선택 -->
      <div id="power-step2" class="hidden"></div>
      <!-- Step 3: 작업명 선택 -->
      <div id="power-step3" class="hidden"></div>
      <!-- Step 4: 재해사례 체크박스 테이블 -->
      <div id="power-step4" class="hidden"></div>
      <!-- 최종 결과 -->
      <div id="power-result" class="hidden"></div>
    </div>

    <!-- ===== 건설업 섹션 ===== -->
    <div id="construction-section" class="hidden">
      <div class="flex items-center gap-2 mb-4 no-print">
        <button class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="goHome()">&#8592; 처음으로</button>
        <span class="text-sm text-gray-400" id="const-breadcrumb">건설업 위험성평가</span>
      </div>

      <!-- 브레드크럼 -->
      <div class="breadcrumb mb-4 no-print" id="breadcrumb">
        <span class="text-gray-500">공종을 선택하세요</span>
      </div>

      <!-- 위자드 -->
      <div id="const-wizard">
        <div id="const-step1"></div>
        <div id="const-step2" class="hidden"></div>
        <div id="const-step3" class="hidden"></div>
      </div>

      <!-- 결과 영역 -->
      <div id="const-results" class="hidden mt-6">
        <div class="flex items-center justify-between mb-4 no-print">
          <h3 class="text-lg font-semibold text-white">위험성평가 결과</h3>
          <div class="flex gap-2">
            <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="resetConstWizard()">다시 선택</button>
            <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg" onclick="handlePrintWithCharts()">인쇄 / PDF</button>
          </div>
        </div>

        <!-- 위험요인 카드 -->
        <div class="mb-6">
          <h4 class="text-sm font-semibold text-gray-400 mb-3">주요 위험요인 (기인물 + 재해형태 조합)</h4>
          <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3" id="risk-cards"></div>
        </div>

        <!-- 차트 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
          <div class="chart-container">
            <h4 class="text-sm font-semibold text-gray-300 mb-3">기인물별 사고건수</h4>
            <div style="height:280px"><canvas id="chart-risk-cause"></canvas></div>
          </div>
          <div class="chart-container">
            <h4 class="text-sm font-semibold text-gray-300 mb-3">재해형태 분포</h4>
            <div style="height:280px"><canvas id="chart-risk-disaster"></canvas></div>
          </div>
        </div>

        <!-- 재해사례 테이블 -->
        <div class="chart-container">
          <h4 class="text-sm font-semibold text-gray-300 mb-3">재해사례 목록</h4>
          <div id="const-case-table"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/data-loader.js"></script>
  <script src="../js/filter-manager.js"></script>
  <script src="../js/chart-manager.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/app.js"></script>

  <script>
    const cm = new ChartManager();
    let allData = [];
    let dropdownRef = {};

    // ===== 공통 =====
    async function init() {
      renderPageHeader('위험성평가 지원', '업종 선택 → 위험요인 파악 → 감소대책 확인', { showPrint: false });
      allData = await DataLoader.loadDB();
      dropdownRef = await DataLoader.loadDropdownRef();
    }

    function showSection(type) {
      document.getElementById('entry-cards').classList.add('hidden');
      document.getElementById('gpts-section').classList.toggle('hidden', type !== 'gpts');
      document.getElementById('power-section').classList.toggle('hidden', type !== 'power');
      document.getElementById('construction-section').classList.toggle('hidden', type !== 'construction');

      if (type === 'power') initPower();
      if (type === 'construction') initConstruction();
    }

    function goHome() {
      document.getElementById('entry-cards').classList.remove('hidden');
      document.getElementById('gpts-section').classList.add('hidden');
      document.getElementById('power-section').classList.add('hidden');
      document.getElementById('construction-section').classList.add('hidden');
      // 상태 초기화
      resetPowerState();
      resetConstState();
    }

    // ===================================================================
    //  발전업 위자드
    // ===================================================================
    const powerState = {
      koenOnly: true,
      selectedRows: new Set(),
      currentGiinmul: null,
      currentJaehae: null,
      currentWork: null,
      processedGiinmuls: [],
      step4CheckedIds: new Set(),
    };

    function resetPowerState() {
      powerState.koenOnly = true;
      powerState.selectedRows = new Set();
      powerState.currentGiinmul = null;
      powerState.currentJaehae = null;
      powerState.currentWork = null;
      powerState.processedGiinmuls = [];
      powerState.step4CheckedIds = new Set();
    }

    function getPowerData() {
      return powerState.koenOnly ? allData.filter(r => r.KOEN공정) : allData;
    }

    function initPower() {
      resetPowerState();
      createKoenToggle('power-koen-wrap', (val) => {
        powerState.koenOnly = val === true;
        renderPowerStep1();
      });
      // 초기 토글 ON
      const toggle = document.getElementById('power-koen-wrap-toggle');
      if (toggle) { toggle.checked = true; toggle.dispatchEvent(new Event('change')); }
      renderPowerStep1();
    }

    function showPowerStep(n) {
      [1,2,3,4].forEach(i => {
        const el = document.getElementById(`power-step${i}`);
        if (el) el.classList.toggle('hidden', i !== n);
      });
      document.getElementById('power-result').classList.add('hidden');
    }

    function updatePowerBreadcrumb(text) {
      document.getElementById('power-breadcrumb').textContent = text || '발전업 위험성평가';
    }

    // Step 1: 기인물 선택 (작업유형별 그룹)
    function renderPowerStep1() {
      showPowerStep(1);
      updatePowerBreadcrumb('기인물 선택');
      const data = getPowerData();

      // 기인물별 건수
      const causeMap = {};
      data.forEach(r => {
        const c = r['기인물'];
        if (c) causeMap[c] = (causeMap[c] || 0) + 1;
      });

      // 밀폐 그룹: 재해형태 '산소결핍 질식' 레코드에서 기인물 추출
      const milpyeCauses = [...new Set(data.filter(r => r['재해형태'] === '산소결핍 질식').map(r => r['기인물']))];

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">1</div>
        <div><div class="wizard-step-title">기인물 선택</div>
        <div class="wizard-step-desc">작업유형별로 분류된 기인물 중 하나를 선택하세요</div></div>
      </div>`;

      // 이미 평가 완료한 기인물이 있으면 안내
      if (powerState.processedGiinmuls.length > 0) {
        html += `<div class="mb-4 p-3 bg-blue-900/20 border border-blue-800 rounded-lg text-sm text-blue-300">
          &#10003; 평가 완료: ${powerState.processedGiinmuls.join(', ')}
          · <span class="text-white font-semibold">${powerState.selectedRows.size}건</span> 누적 선택
          <button class="ml-3 px-3 py-1 bg-green-700 hover:bg-green-600 text-white text-xs rounded" onclick="showPowerResult()">평가 완료</button>
        </div>`;
      }

      const workTypes = Object.keys(WORK_TYPE_MAP);
      workTypes.forEach(type => {
        const causes = type === '밀폐' ? milpyeCauses : (WORK_TYPE_MAP[type] || []);
        if (!causes || causes.length === 0) return;

        // 이 그룹에 건수가 0인 기인물만이면 스킵
        const hasCounts = causes.some(c => causeMap[c]);
        if (!hasCounts) return;

        html += `<div class="work-type-group">
          <div class="work-type-group-title">${type}</div>
          <div class="flex flex-wrap gap-2">`;

        causes.forEach(cause => {
          const count = causeMap[cause] || 0;
          if (count === 0) return;
          const isProcessed = powerState.processedGiinmuls.includes(cause);
          const cls = isProcessed ? 'wizard-chip completed' : 'wizard-chip';
          const onclick = isProcessed ? '' : `onclick="selectPowerGiinmul('${cause.replace(/'/g, "\\'")}')"`;
          html += `<div class="${cls}" ${onclick}>
            <span>${cause}</span>
            <span class="chip-count">${count}건</span>
            ${isProcessed ? '<span class="text-green-500 text-xs">&#10003;</span>' : ''}
          </div>`;
        });

        html += `</div></div>`;
      });

      document.getElementById('power-step1').innerHTML = html;
    }

    function selectPowerGiinmul(cause) {
      powerState.currentGiinmul = cause;
      renderPowerStep2();
    }

    // Step 2: 재해형태 선택 (복수)
    function renderPowerStep2() {
      showPowerStep(2);
      updatePowerBreadcrumb(`${powerState.currentGiinmul} → 재해형태 선택`);
      const data = getPowerData().filter(r => r['기인물'] === powerState.currentGiinmul);

      const typeMap = {};
      data.forEach(r => {
        const t = r['재해형태'];
        if (t) typeMap[t] = (typeMap[t] || 0) + 1;
      });
      const sorted = Object.entries(typeMap).sort((a, b) => b[1] - a[1]);

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">2</div>
        <div><div class="wizard-step-title">재해형태 선택</div>
        <div class="wizard-step-desc">${powerState.currentGiinmul}의 재해형태를 선택하세요 (복수 가능)</div></div>
      </div>`;

      html += `<div class="space-y-2 max-w-lg" id="power-jaehae-list">`;
      html += `<div class="wizard-check-item">
        <input type="checkbox" id="pw-jh-all" checked>
        <label for="pw-jh-all">전체 (${data.length}건)</label>
      </div>`;
      sorted.forEach(([type, count], i) => {
        html += `<div class="wizard-check-item">
          <input type="checkbox" id="pw-jh-${i}" value="${type.replace(/"/g, '&quot;')}" checked>
          <label for="pw-jh-${i}">${type}</label>
          <span class="item-count">${count}건</span>
        </div>`;
      });
      html += `</div>`;

      html += `<div class="flex gap-2 mt-4">
        <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="renderPowerStep1(); showPowerStep(1);">이전</button>
        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg" onclick="powerStep2Next()">다음</button>
      </div>`;

      document.getElementById('power-step2').innerHTML = html;

      // 전체 체크박스 로직
      const allCb = document.getElementById('pw-jh-all');
      const list = document.getElementById('power-jaehae-list');
      allCb.addEventListener('change', () => {
        list.querySelectorAll('input[type="checkbox"]:not(#pw-jh-all)').forEach(cb => { cb.checked = allCb.checked; });
      });
      list.querySelectorAll('input[type="checkbox"]:not(#pw-jh-all)').forEach(cb => {
        cb.addEventListener('change', () => {
          const all = list.querySelectorAll('input[type="checkbox"]:not(#pw-jh-all)');
          const checked = list.querySelectorAll('input[type="checkbox"]:not(#pw-jh-all):checked');
          allCb.checked = all.length === checked.length;
        });
      });
    }

    function powerStep2Next() {
      const list = document.getElementById('power-jaehae-list');
      const checked = [...list.querySelectorAll('input[type="checkbox"]:not(#pw-jh-all):checked')].map(cb => cb.value);
      powerState.currentJaehae = checked.length > 0 ? checked : null;
      renderPowerStep3();
    }

    // Step 3: 작업명 선택 (복수)
    function renderPowerStep3() {
      showPowerStep(3);
      updatePowerBreadcrumb(`${powerState.currentGiinmul} → 작업명 선택`);
      let data = getPowerData().filter(r => r['기인물'] === powerState.currentGiinmul);
      if (powerState.currentJaehae) {
        data = data.filter(r => powerState.currentJaehae.includes(r['재해형태']));
      }

      const workMap = {};
      data.forEach(r => {
        const w = r['작업명'];
        if (w) workMap[w] = (workMap[w] || 0) + 1;
      });
      const sorted = Object.entries(workMap).sort((a, b) => b[1] - a[1]);

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">3</div>
        <div><div class="wizard-step-title">작업명 선택</div>
        <div class="wizard-step-desc">유사한 작업명을 선택하세요 (복수 가능)</div></div>
      </div>`;

      html += `<div class="space-y-2 max-w-lg" id="power-work-list">`;
      html += `<div class="wizard-check-item">
        <input type="checkbox" id="pw-wk-all" checked>
        <label for="pw-wk-all">전체 (${data.length}건)</label>
      </div>`;
      sorted.forEach(([work, count], i) => {
        html += `<div class="wizard-check-item">
          <input type="checkbox" id="pw-wk-${i}" value="${work.replace(/"/g, '&quot;')}" checked>
          <label for="pw-wk-${i}">${work}</label>
          <span class="item-count">${count}건</span>
        </div>`;
      });
      html += `</div>`;

      html += `<div class="flex gap-2 mt-4">
        <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="renderPowerStep2(); showPowerStep(2);">이전</button>
        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg" onclick="powerStep3Next()">다음</button>
      </div>`;

      document.getElementById('power-step3').innerHTML = html;

      // 전체 체크박스 로직
      const allCb = document.getElementById('pw-wk-all');
      const list = document.getElementById('power-work-list');
      allCb.addEventListener('change', () => {
        list.querySelectorAll('input[type="checkbox"]:not(#pw-wk-all)').forEach(cb => { cb.checked = allCb.checked; });
      });
      list.querySelectorAll('input[type="checkbox"]:not(#pw-wk-all)').forEach(cb => {
        cb.addEventListener('change', () => {
          const all = list.querySelectorAll('input[type="checkbox"]:not(#pw-wk-all)');
          const checked = list.querySelectorAll('input[type="checkbox"]:not(#pw-wk-all):checked');
          allCb.checked = all.length === checked.length;
        });
      });
    }

    function powerStep3Next() {
      const list = document.getElementById('power-work-list');
      const checked = [...list.querySelectorAll('input[type="checkbox"]:not(#pw-wk-all):checked')].map(cb => cb.value);
      powerState.currentWork = checked.length > 0 ? checked : null;
      renderPowerStep4();
    }

    // Step 4: 재해사례 체크박스 테이블
    function renderPowerStep4() {
      showPowerStep(4);
      updatePowerBreadcrumb(`${powerState.currentGiinmul} → 재해사례 선택`);

      let data = getPowerData().filter(r => r['기인물'] === powerState.currentGiinmul);
      if (powerState.currentJaehae) {
        data = data.filter(r => powerState.currentJaehae.includes(r['재해형태']));
      }
      if (powerState.currentWork) {
        data = data.filter(r => powerState.currentWork.includes(r['작업명']));
      }

      // 이미 선택된 행은 체크 상태 유지
      powerState.step4CheckedIds = new Set(data.map(r => r.id));

      const columns = [
        { key: '기인물', label: '기인물', width: 90 },
        { key: '재해형태', label: '재해형태', width: 70 },
        { key: '작업명', label: '작업명', width: 120 },
        { key: '재해개요', label: '재해개요', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '위험성감소대책', label: '감소대책', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
      ];

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">4</div>
        <div><div class="wizard-step-title">재해사례 선택</div>
        <div class="wizard-step-desc">평가에 포함할 사례를 선택하세요 (기본: 전체 선택)</div></div>
      </div>`;
      html += `<div id="power-sel-table"></div>`;
      html += `<div class="flex gap-2 mt-4 no-print">
        <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="renderPowerStep3(); showPowerStep(3);">이전</button>
        <button class="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-sm rounded-lg" onclick="powerAddAndNext()">&#10003; 추가 후 다음 기인물</button>
        <button class="px-4 py-2 bg-green-600 hover:bg-green-500 text-sm rounded-lg" onclick="powerAddAndFinish()">&#10003; 추가 후 평가 완료</button>
      </div>`;

      document.getElementById('power-step4').innerHTML = html;

      buildSelectableTable('power-sel-table', columns, data, {
        pageSize: 10,
        checkedIds: powerState.step4CheckedIds,
        onCheckChange: (ids) => { powerState.step4CheckedIds = new Set(ids); }
      });
    }

    function powerAddAndNext() {
      // 누적
      powerState.step4CheckedIds.forEach(id => powerState.selectedRows.add(id));
      powerState.processedGiinmuls.push(powerState.currentGiinmul);
      powerState.currentGiinmul = null;
      powerState.currentJaehae = null;
      powerState.currentWork = null;
      powerState.step4CheckedIds = new Set();
      renderPowerStep1();
    }

    function powerAddAndFinish() {
      powerState.step4CheckedIds.forEach(id => powerState.selectedRows.add(id));
      if (!powerState.processedGiinmuls.includes(powerState.currentGiinmul)) {
        powerState.processedGiinmuls.push(powerState.currentGiinmul);
      }
      showPowerResult();
    }

    function showPowerResult() {
      [1,2,3,4].forEach(i => {
        document.getElementById(`power-step${i}`).classList.add('hidden');
      });
      document.getElementById('power-result').classList.remove('hidden');
      updatePowerBreadcrumb('평가 결과');

      const selectedData = allData.filter(r => powerState.selectedRows.has(r.id));

      // 인쇄 제목
      document.getElementById('print-title').textContent = `발전업 위험성평가 결과 — ${powerState.processedGiinmuls.join(', ')}`;

      let html = `<div class="flex items-center justify-between mb-4 no-print">
        <h3 class="text-lg font-semibold text-white">평가 결과 (${selectedData.length}건)</h3>
        <div class="flex gap-2">
          <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="initPower()">다시 선택</button>
          <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg" onclick="handlePrintWithCharts()">인쇄 / PDF</button>
        </div>
      </div>`;

      html += `<div id="power-result-table"></div>`;

      document.getElementById('power-result').innerHTML = html;

      const columns = [
        { key: 'id', label: 'No', width: 40 },
        { key: '기인물', label: '기인물', width: 90 },
        { key: '재해형태', label: '재해형태', width: 70 },
        { key: '작업명', label: '작업명', width: 120 },
        { key: '재해개요', label: '재해개요', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '재해유발요인', label: '유발요인', minWidth: 180, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '위험성감소대책', label: '감소대책', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
      ];
      buildTable('power-result-table', columns, selectedData, { pageSize: 20 });
    }

    // ===================================================================
    //  건설업 위자드
    // ===================================================================
    const constState = { 공종: [], 작업명: [], 단위작업명: [] };

    function resetConstState() {
      constState['공종'] = [];
      constState['작업명'] = [];
      constState['단위작업명'] = [];
    }

    function initConstruction() {
      resetConstState();
      renderConstStep1();
    }

    function showConstStep(n) {
      [1,2,3].forEach(i => {
        document.getElementById(`const-step${i}`).classList.toggle('hidden', i !== n);
      });
      document.getElementById('const-results').classList.add('hidden');
      document.getElementById('const-wizard').classList.remove('hidden');
    }

    function updateConstBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      let parts = [];
      if (constState['공종'].length > 0) {
        const names = constState['공종'].map(g => g.replace(/^\d+\.\s*/, ''));
        parts.push(`<a onclick="showConstStep(1)">${names.length > 2 ? names.slice(0,2).join(', ') + ` 외 ${names.length - 2}개` : names.join(', ')}</a>`);
      }
      if (constState['작업명'].length > 0) {
        const names = constState['작업명'];
        parts.push(`<a onclick="showConstStep(2)">${names.length > 2 ? names.slice(0,2).join(', ') + ` 외 ${names.length - 2}개` : names.join(', ')}</a>`);
      }
      if (constState['단위작업명'].length > 0) {
        const names = constState['단위작업명'];
        parts.push(`<span class="text-white font-medium">${names.length > 2 ? names.slice(0,2).join(', ') + ` 외 ${names.length - 2}개` : names.join(', ')}</span>`);
      }
      bc.innerHTML = parts.length
        ? parts.join('<span class="separator">&#8250;</span>')
        : '<span class="text-gray-500">공종을 선택하세요</span>';
    }

    function resetConstWizard() {
      resetConstState();
      updateConstBreadcrumb();
      document.getElementById('const-results').classList.add('hidden');
      renderConstStep1();
    }

    // Step 1: 공종 선택 (복수)
    function renderConstStep1() {
      showConstStep(1);
      const hierarchy = dropdownRef.hierarchy || {};
      const gzList = Object.keys(hierarchy);
      const gzCounts = {};
      allData.forEach(r => { gzCounts[r['공종']] = (gzCounts[r['공종']] || 0) + 1; });

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">1</div>
        <div><div class="wizard-step-title">공종 선택</div>
        <div class="wizard-step-desc">하나 이상의 공종을 선택하세요</div></div>
      </div>`;

      html += `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3" id="const-gz-cards">`;
      gzList.forEach(gz => {
        const shortName = gz.replace(/^\d+\.\s*/, '');
        const count = gzCounts[gz] || 0;
        const isSelected = constState['공종'].includes(gz);
        html += `<div class="wizard-card ${isSelected ? 'selected' : ''}" data-gz="${gz.replace(/"/g, '&quot;')}" onclick="toggleConstGZ(this, '${gz.replace(/'/g, "\\'")}')">
          <p class="text-sm font-semibold text-white">${shortName}</p>
          <p class="text-xs text-gray-500 mt-1">${formatNumber(count)}건</p>
          ${isSelected ? '<p class="text-xs text-blue-400 mt-1">&#10003; 선택됨</p>' : ''}
        </div>`;
      });
      html += `</div>`;

      html += `<div class="flex gap-2 mt-4">
        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg" onclick="constStep1Next()" id="const-step1-next" ${constState['공종'].length === 0 ? 'disabled style="opacity:0.5"' : ''}>다음 (${constState['공종'].length}개 선택)</button>
      </div>`;

      document.getElementById('const-step1').innerHTML = html;
    }

    function toggleConstGZ(el, gz) {
      const idx = constState['공종'].indexOf(gz);
      if (idx >= 0) constState['공종'].splice(idx, 1);
      else constState['공종'].push(gz);

      // UI 즉시 반영
      el.classList.toggle('selected');
      const checkText = el.querySelector('.text-blue-400');
      if (constState['공종'].includes(gz)) {
        if (!checkText) {
          const p = document.createElement('p');
          p.className = 'text-xs text-blue-400 mt-1';
          p.innerHTML = '&#10003; 선택됨';
          el.appendChild(p);
        }
      } else {
        if (checkText) checkText.remove();
      }

      const btn = document.getElementById('const-step1-next');
      btn.textContent = `다음 (${constState['공종'].length}개 선택)`;
      btn.disabled = constState['공종'].length === 0;
      btn.style.opacity = constState['공종'].length === 0 ? '0.5' : '1';
    }

    function constStep1Next() {
      if (constState['공종'].length === 0) return;
      constState['작업명'] = [];
      constState['단위작업명'] = [];
      updateConstBreadcrumb();
      renderConstStep2();
    }

    // Step 2: 작업명 선택 (복수)
    function renderConstStep2() {
      showConstStep(2);
      const hierarchy = dropdownRef.hierarchy || {};
      const works = new Set();
      constState['공종'].forEach(gz => {
        if (hierarchy[gz]) Object.keys(hierarchy[gz]).forEach(w => works.add(w));
      });
      const workList = [...works].sort();

      // 작업명별 건수
      const workCounts = {};
      allData.filter(r => constState['공종'].includes(r['공종'])).forEach(r => {
        workCounts[r['작업명']] = (workCounts[r['작업명']] || 0) + 1;
      });

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">2</div>
        <div><div class="wizard-step-title">작업명 선택</div>
        <div class="wizard-step-desc">하나 이상의 작업명을 선택하세요</div></div>
      </div>`;

      html += `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3" id="const-work-cards">`;
      workList.forEach(w => {
        const count = workCounts[w] || 0;
        const isSelected = constState['작업명'].includes(w);
        html += `<div class="wizard-card ${isSelected ? 'selected' : ''}" onclick="toggleConstWork(this, '${w.replace(/'/g, "\\'")}')">
          <p class="text-sm font-semibold text-white">${w}</p>
          <p class="text-xs text-gray-500 mt-1">${formatNumber(count)}건</p>
          ${isSelected ? '<p class="text-xs text-blue-400 mt-1">&#10003; 선택됨</p>' : ''}
        </div>`;
      });
      html += `</div>`;

      html += `<div class="flex gap-2 mt-4">
        <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="renderConstStep1()">이전</button>
        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg" onclick="constStep2Next()" id="const-step2-next" ${constState['작업명'].length === 0 ? 'disabled style="opacity:0.5"' : ''}>다음 (${constState['작업명'].length}개 선택)</button>
      </div>`;

      document.getElementById('const-step2').innerHTML = html;
    }

    function toggleConstWork(el, w) {
      const idx = constState['작업명'].indexOf(w);
      if (idx >= 0) constState['작업명'].splice(idx, 1);
      else constState['작업명'].push(w);

      el.classList.toggle('selected');
      const checkText = el.querySelector('.text-blue-400');
      if (constState['작업명'].includes(w)) {
        if (!checkText) {
          const p = document.createElement('p');
          p.className = 'text-xs text-blue-400 mt-1';
          p.innerHTML = '&#10003; 선택됨';
          el.appendChild(p);
        }
      } else {
        if (checkText) checkText.remove();
      }

      const btn = document.getElementById('const-step2-next');
      btn.textContent = `다음 (${constState['작업명'].length}개 선택)`;
      btn.disabled = constState['작업명'].length === 0;
      btn.style.opacity = constState['작업명'].length === 0 ? '0.5' : '1';
    }

    function constStep2Next() {
      if (constState['작업명'].length === 0) return;
      constState['단위작업명'] = [];
      updateConstBreadcrumb();
      renderConstStep3();
    }

    // Step 3: 단위작업명 선택 (복수)
    function renderConstStep3() {
      showConstStep(3);
      const hierarchy = dropdownRef.hierarchy || {};
      const units = new Set();
      constState['공종'].forEach(gz => {
        constState['작업명'].forEach(w => {
          if (hierarchy[gz] && hierarchy[gz][w]) {
            hierarchy[gz][w].forEach(u => units.add(u));
          }
        });
      });
      const unitList = [...units].sort();

      const unitCounts = {};
      allData.filter(r => constState['공종'].includes(r['공종']) && constState['작업명'].includes(r['작업명'])).forEach(r => {
        unitCounts[r['단위작업명']] = (unitCounts[r['단위작업명']] || 0) + 1;
      });

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">3</div>
        <div><div class="wizard-step-title">단위작업명 선택</div>
        <div class="wizard-step-desc">하나 이상의 단위작업명을 선택하세요</div></div>
      </div>`;

      html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" id="const-unit-cards">`;
      unitList.forEach(u => {
        const count = unitCounts[u] || 0;
        const isSelected = constState['단위작업명'].includes(u);
        html += `<div class="wizard-card ${isSelected ? 'selected' : ''}" onclick="toggleConstUnit(this, '${u.replace(/'/g, "\\'")}')">
          <p class="text-sm font-semibold text-white">${u}</p>
          <p class="text-xs text-gray-500 mt-1">${formatNumber(count)}건</p>
          ${isSelected ? '<p class="text-xs text-blue-400 mt-1">&#10003; 선택됨</p>' : ''}
        </div>`;
      });
      html += `</div>`;

      html += `<div class="flex gap-2 mt-4">
        <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="renderConstStep2()">이전</button>
        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg" onclick="constStep3Next()" id="const-step3-next" ${constState['단위작업명'].length === 0 ? 'disabled style="opacity:0.5"' : ''}>결과 보기 (${constState['단위작업명'].length}개 선택)</button>
      </div>`;

      document.getElementById('const-step3').innerHTML = html;
    }

    function toggleConstUnit(el, u) {
      const idx = constState['단위작업명'].indexOf(u);
      if (idx >= 0) constState['단위작업명'].splice(idx, 1);
      else constState['단위작업명'].push(u);

      el.classList.toggle('selected');
      const checkText = el.querySelector('.text-blue-400');
      if (constState['단위작업명'].includes(u)) {
        if (!checkText) {
          const p = document.createElement('p');
          p.className = 'text-xs text-blue-400 mt-1';
          p.innerHTML = '&#10003; 선택됨';
          el.appendChild(p);
        }
      } else {
        if (checkText) checkText.remove();
      }

      const btn = document.getElementById('const-step3-next');
      btn.textContent = `결과 보기 (${constState['단위작업명'].length}개 선택)`;
      btn.disabled = constState['단위작업명'].length === 0;
      btn.style.opacity = constState['단위작업명'].length === 0 ? '0.5' : '1';
    }

    function constStep3Next() {
      if (constState['단위작업명'].length === 0) return;
      updateConstBreadcrumb();
      showConstResults();
    }

    function showConstResults() {
      document.getElementById('const-wizard').classList.add('hidden');
      document.getElementById('const-results').classList.remove('hidden');

      const filtered = allData.filter(r => {
        return constState['공종'].includes(r['공종'])
          && constState['작업명'].includes(r['작업명'])
          && constState['단위작업명'].includes(r['단위작업명']);
      });

      // 인쇄 제목
      const gzNames = constState['공종'].map(g => g.replace(/^\d+\.\s*/, '')).join(', ');
      document.getElementById('print-title').textContent = `건설업 위험성평가 결과 — ${gzNames}`;

      renderRiskCards(filtered);
      renderConstCharts(filtered);
      renderConstTable(filtered);
    }

    function renderRiskCards(data) {
      const combos = {};
      data.forEach(r => {
        const key = `${r['기인물']}|||${r['재해형태']}`;
        if (!combos[key]) combos[key] = { 기인물: r['기인물'], 재해형태: r['재해형태'], count: 0, is12: r['12대기인물'] };
        combos[key].count++;
      });

      const sorted = Object.values(combos).sort((a, b) => b.count - a.count).slice(0, 10);
      const total = data.length;

      document.getElementById('risk-cards').innerHTML = sorted.map((item, i) => {
        const pct = (item.count / total * 100).toFixed(1);
        let riskClass, riskLabel;
        if (item.count >= 10 || i === 0) {
          riskClass = 'border-red-500/50 bg-red-950/30';
          riskLabel = '<span class="risk-badge high">높음</span>';
        } else if (item.count >= 5) {
          riskClass = 'border-amber-500/50 bg-amber-950/30';
          riskLabel = '<span class="risk-badge medium">중간</span>';
        } else {
          riskClass = 'border-green-500/50 bg-green-950/30';
          riskLabel = '<span class="risk-badge low">낮음</span>';
        }
        return `
          <div class="rounded-lg border ${riskClass} p-4">
            <div class="flex items-center justify-between mb-2">
              ${riskLabel}
              ${item.is12 ? '<span class="badge-12">12대</span>' : ''}
            </div>
            <p class="text-sm font-semibold text-white">${item.기인물}</p>
            <p class="text-xs text-gray-400 mt-1">재해형태: ${item.재해형태}</p>
            <div class="mt-2 flex items-baseline gap-2">
              <span class="text-xl font-bold text-white">${item.count}</span>
              <span class="text-xs text-gray-500">건 (${pct}%)</span>
            </div>
          </div>`;
      }).join('');
    }

    function renderConstCharts(data) {
      const causeAgg = aggregateBy(data, '기인물');
      const causeSorted = topN(causeAgg, 'count', 8);

      cm.create('chart-risk-cause', {
        type: 'bar',
        data: {
          labels: causeSorted.map(a => a.key),
          datasets: [{
            data: causeSorted.map(a => a.count),
            backgroundColor: causeSorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: causeSorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: { x: { grid: { color: '#1F2937' } }, y: { grid: { display: false }, ticks: { font: { size: 10 } } } }
        }
      });

      const disasterAgg = aggregateBy(data, '재해형태');
      const disasterSorted = topN(disasterAgg, 'count', 8);

      cm.create('chart-risk-disaster', {
        type: 'doughnut',
        data: {
          labels: disasterSorted.map(a => a.key),
          datasets: [{
            data: disasterSorted.map(a => a.count),
            backgroundColor: disasterSorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 0,
          }]
        },
        options: {
          cutout: '50%',
          plugins: {
            legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } },
            datalabels: {
              display: true, color: '#fff', font: { size: 9, weight: 'bold' },
              formatter: (value, ctx) => { const t = ctx.dataset.data.reduce((a,b)=>a+b,0); const p=(value/t*100).toFixed(1); return p<5?'':`${value}건\n${p}%`; },
              textAlign: 'center',
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    function renderConstTable(data) {
      const columns = [
        { key: 'id', label: 'No', width: 40 },
        { key: '기인물', label: '기인물', width: 100, wrap: true },
        { key: '재해형태', label: '재해형태', width: 70 },
        { key: '재해개요', label: '재해개요', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '재해유발요인', label: '유발요인', minWidth: 180, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '위험성감소대책', label: '감소대책', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
      ];
      buildTable('const-case-table', columns, data, {
        pageSize: 10,
        filterColumns: ['기인물', '재해형태']
      });
    }

    init();
  </script>
</body>
</html>
