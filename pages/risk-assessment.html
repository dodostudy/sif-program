  <script src="../js/data-loader.js"></script>

  <script>
    const cm = new ChartManager();
    let allData = [];
    let dropdownRef = {};

    async function init() {
      renderPageHeader('위험성평가 생성', '업종 선택 → 위험요인 파악 → 감소대책 확인', { showPrint: false });
      allData = await DataLoader.loadDB();
      dropdownRef = await DataLoader.loadDropdownRef();
    }

    function showSection(type) {
      document.getElementById('entry-cards').classList.add('hidden');
      document.getElementById('power-section').classList.toggle('hidden', type !== 'power');
      document.getElementById('construction-section').classList.toggle('hidden', type !== 'construction');
      if (type === 'power') initPower();
      if (type === 'construction') initConstruction();
    }

    function goHome() {
      document.getElementById('entry-cards').classList.remove('hidden');
      document.getElementById('power-section').classList.add('hidden');
      document.getElementById('construction-section').classList.add('hidden');
      resetPowerState();
      resetConstState();
    }

    // ===================================================================
    //  발전업 위자드
    // ===================================================================
    const powerState = {
      koenOnly: true,
      selectedRows: new Set(),
      currentGiinmuls: new Set(),
      milpyeCauses: [],               // 산소결핍 질식 기인물 목록 (동적)
      currentJaehae: null,
      currentWork: null,
      processedGiinmuls: [],
      step4CheckedIds: new Set(),
      viewMode: 'grouped',
    };

    function resetPowerState() {
      powerState.koenOnly = true;
      powerState.selectedRows = new Set();
      powerState.currentGiinmuls = new Set();
      powerState.milpyeCauses = [];
      powerState.currentJaehae = null;
      powerState.currentWork = null;
      powerState.processedGiinmuls = [];
      powerState.step4CheckedIds = new Set();
      powerState.viewMode = 'grouped';
    }

    function getPowerData() {
      return powerState.koenOnly ? allData.filter(r => r.KOEN공정) : allData;
    }

    /** 기인물이 속한 작업유형 그룹 반환 */
    function getGroupForCause(cause) {
      for (const [type, causes] of Object.entries(WORK_TYPE_MAP)) {
        if (type === '밀폐') {
          if (powerState.milpyeCauses.includes(cause)) return '밀폐';
        } else if (causes && causes.includes(cause)) {
          return type;
        }
      }
      return null;
    }

    /** 그룹별 규칙을 적용한 데이터 필터링
     *  - 밀폐 기인물: 재해형태 = 산소결핍 질식만
     *  - 일반 기인물: 재해형태 = 산소결핍 질식 제외
     */
    function getPowerDataFiltered() {
      const causes = [...powerState.currentGiinmuls];
      return getPowerData().filter(r => {
        if (!causes.includes(r['기인물'])) return false;
        const group = getGroupForCause(r['기인물']);
        if (group === '밀폐' && r['재해형태'] !== '산소결핍 질식') return false;
        if (group === '일반' && r['재해형태'] === '산소결핍 질식') return false;
        return true;
      });
    }

    function initPower() {
      resetPowerState();
      createKoenToggle('power-koen-wrap', (val) => {
        powerState.koenOnly = val === true;
        renderPowerStep1();
      });
      const toggle = document.getElementById('power-koen-wrap-toggle');
      if (toggle) { toggle.checked = true; toggle.dispatchEvent(new Event('change')); }
      else renderPowerStep1();
    }

    function showPowerStep(n) {
      [1,2,3,4].forEach(i => {
        const el = document.getElementById(`power-step${i}`);
        if (el) el.classList.toggle('hidden', i !== n);
      });
      document.getElementById('power-result').classList.add('hidden');
    }

    function updatePowerBreadcrumb(text) {
      document.getElementById('power-breadcrumb').textContent = text || '발전업 위험성평가';
    }

    // ── Step 1: 기인물 선택 (다중 선택, 그룹별/전체 토글) ──────────────
    function renderPowerStep1() {
      showPowerStep(1);
      updatePowerBreadcrumb('기인물 선택');
      const data = getPowerData();

      // 밀폐 그룹 기인물 동적 추출 및 상태 저장
      powerState.milpyeCauses = [...new Set(data.filter(r => r['재해형태'] === '산소결핍 질식').map(r => r['기인물']))];
      const milpyeCauses = powerState.milpyeCauses;

      // 그룹별 규칙 적용 건수 계산
      // 밀폐: 산소결핍 질식 레코드만, 일반: 산소결핍 질식 제외
      function getCauseCount(cause, group) {
        let filtered = data.filter(r => r['기인물'] === cause);
        if (group === '밀폐') filtered = filtered.filter(r => r['재해형태'] === '산소결핍 질식');
        if (group === '일반') filtered = filtered.filter(r => r['재해형태'] !== '산소결핍 질식');
        return filtered.length;
      }

      // 각 기인물의 그룹 매핑 및 건수 집계 (다빈도순 전체 뷰 포함)
      const causeGroupMap = {};
      Object.entries(WORK_TYPE_MAP).forEach(([type, causes]) => {
        const list = type === '밀폐' ? milpyeCauses : (causes || []);
        list.forEach(c => { if (!(c in causeGroupMap)) causeGroupMap[c] = type; });
      });
      const causeCountMap = {};
      Object.entries(causeGroupMap).forEach(([cause, group]) => {
        const cnt = getCauseCount(cause, group);
        if (cnt > 0) causeCountMap[cause] = cnt;
      });

      const maxCount = Math.max(...Object.values(causeCountMap), 1);

      const isGrouped = powerState.viewMode === 'grouped';

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">1</div>
        <div>
          <div class="wizard-step-title">기인물 선택</div>
          <div class="wizard-step-desc">기인물을 하나 이상 선택하세요</div>
        </div>
      </div>`;

      // 평가 완료 기인물 안내 + 완료 버튼
      if (powerState.processedGiinmuls.length > 0) {
        html += `<div class="mb-4 p-3 bg-blue-900/20 border border-blue-800 rounded-lg text-sm text-blue-300 flex items-center gap-3 flex-wrap">
          <span>&#10003; 평가 완료: <strong class="text-white">${powerState.processedGiinmuls.join(', ')}</strong></span>
          <span class="text-gray-400">·</span>
          <span class="text-white font-semibold">${powerState.selectedRows.size}건 누적 선택</span>
          <button class="ml-auto px-3 py-1 bg-green-700 hover:bg-green-600 text-white text-xs rounded" onclick="showPowerResult()">평가 완료</button>
        </div>`;
      }

      // 뷰 토글 버튼
      html += `<div class="flex items-center gap-2 mb-4 no-print">
        <button onclick="powerState.viewMode='grouped'; renderPowerStep1();"
          class="px-3 py-1.5 text-xs rounded-lg border transition-colors ${isGrouped ? 'bg-blue-600 border-blue-500 text-white' : 'bg-gray-800 border-gray-700 text-gray-400 hover:border-gray-500'}">
          작업유형별
        </button>
        <button onclick="powerState.viewMode='flat'; renderPowerStep1();"
          class="px-3 py-1.5 text-xs rounded-lg border transition-colors ${!isGrouped ? 'bg-blue-600 border-blue-500 text-white' : 'bg-gray-800 border-gray-700 text-gray-400 hover:border-gray-500'}">
          다빈도순 전체
        </button>
        ${powerState.currentGiinmuls.size > 0 ? `<span class="ml-2 text-xs text-blue-300"><strong>${powerState.currentGiinmuls.size}개</strong> 선택됨</span>` : ''}
      </div>`;

      if (isGrouped) {
        // 그룹별 색상 맵
        const GROUP_COLORS = {
          '고소':          { border: '#3B82F6', text: '#93C5FD' },
          '중장비':        { border: '#F59E0B', text: '#FCD34D' },
          '굴착':          { border: '#D97706', text: '#FDE68A' },
          '전기':          { border: '#EAB308', text: '#FEF08A' },
          '중량물':        { border: '#6B7280', text: '#D1D5DB' },
          '화기':          { border: '#EF4444', text: '#FCA5A5' },
          '밀폐':          { border: '#8B5CF6', text: '#C4B5FD' },
          '일반':          { border: '#10B981', text: '#6EE7B7' },
          '폭염/원인미상': { border: '#F97316', text: '#FDBA74' },
          '화학물질':      { border: '#84CC16', text: '#BEF264' },
        };

        // 5열 그리드 — 행/열 균형, 가로 스크롤 없음
        html += `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 mb-5">`;

        const workTypes = Object.keys(WORK_TYPE_MAP);
        workTypes.forEach(type => {
          const causes = type === '밀폐' ? milpyeCauses : (WORK_TYPE_MAP[type] || []);
          if (!causes || causes.length === 0) return;
          const validCauses = causes.filter(c => getCauseCount(c, type) > 0);
          if (validCauses.length === 0) return;

          // 건수 내림차순 정렬
          const sorted = validCauses.sort((a, b) => getCauseCount(b, type) - getCauseCount(a, type));
          const color = GROUP_COLORS[type] || { border: '#4B5563', text: '#9CA3AF' };

          html += `<div class="bg-gray-900/60 border border-gray-800 rounded-xl p-3" style="border-top: 2px solid ${color.border}">
            <div class="text-xs font-bold mb-3 pb-2 border-b border-gray-700/60 flex items-center gap-1.5" style="color:${color.text}">
              <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${color.border};flex-shrink:0"></span>
              ${type}
            </div>
            <div class="space-y-1.5">`;

          sorted.forEach(cause => {
            const count = getCauseCount(cause, type);
            const ratio = count / maxCount;
            const isSelected = powerState.currentGiinmuls.has(cause);
            const isProcessed = powerState.processedGiinmuls.includes(cause);
            const chipStyle = getCauseChipStyle(ratio, isSelected, isProcessed);

            if (isProcessed) {
              html += `<div class="cause-chip-row opacity-50 cursor-default" title="${cause} — 평가 완료">
                <span class="cause-chip-name">${cause}</span>
                <span class="cause-chip-count text-green-500">&#10003;</span>
              </div>`;
            } else {
              html += `<div class="cause-chip-row ${chipStyle.row}" onclick="togglePowerGiinmul('${cause.replace(/'/g,"\\'")}')">
                <span class="cause-chip-name ${chipStyle.name}">${cause}</span>
                <span class="cause-chip-count ${chipStyle.count}">${count}</span>
                ${isSelected ? '<span class="cause-chip-check">&#10003;</span>' : ''}
              </div>`;
            }
          });

          html += `</div></div>`;
        });

        html += `</div>`;
      } else {
        // 전체 다빈도순 (그룹별 규칙 적용 건수 기준 내림차순)
        const sorted = Object.entries(causeCountMap).sort((a, b) => b[1] - a[1]);
        html += `<div class="flex flex-wrap gap-2 mb-4">`;
        sorted.forEach(([cause, count]) => {
          const ratio = count / maxCount;
          const isSelected = powerState.currentGiinmuls.has(cause);
          const isProcessed = powerState.processedGiinmuls.includes(cause);
          const chipStyle = getCauseChipStyle(ratio, isSelected, isProcessed);

          if (isProcessed) {
            html += `<div class="cause-flat-chip opacity-50 cursor-default">
              <span>${cause}</span><span class="text-green-500 text-xs ml-1">&#10003;</span>
            </div>`;
          } else {
            html += `<div class="cause-flat-chip ${chipStyle.flat}" onclick="togglePowerGiinmul('${cause.replace(/'/g,"\\'")}')">
              <span>${cause}</span>
              <span class="cause-chip-count ${chipStyle.count}">${count}</span>
              ${isSelected ? '<span class="text-blue-300 text-xs">&#10003;</span>' : ''}
            </div>`;
          }
        });
        html += `</div>`;
      }

      // 하단 버튼
      const selCount = powerState.currentGiinmuls.size;
      html += `<div class="flex gap-2 mt-2">
        <button class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg font-semibold transition-colors ${selCount === 0 ? 'opacity-40 cursor-not-allowed' : ''}"
          onclick="${selCount > 0 ? 'renderPowerStep2()' : ''}"
          ${selCount === 0 ? 'disabled' : ''}>
          다음 → (${selCount}개 선택)
        </button>
        ${selCount > 0 ? `<button class="px-3 py-2 text-xs text-gray-500 hover:text-gray-300" onclick="powerState.currentGiinmuls.clear(); renderPowerStep1();">선택 초기화</button>` : ''}
      </div>`;

      document.getElementById('power-step1').innerHTML = html;
    }

    /** 건수 비율에 따른 칩 스타일 */
    function getCauseChipStyle(ratio, isSelected, isProcessed) {
      if (isSelected) {
        return {
          row: 'cause-chip-row-selected',
          flat: 'cause-flat-chip-selected',
          name: 'font-bold text-white',
          count: 'text-blue-300 font-bold',
        };
      }
      if (ratio >= 0.6) return { row: 'cause-chip-row-l4', flat: 'cause-flat-chip-l4', name: 'font-bold text-white', count: 'text-red-300 font-bold' };
      if (ratio >= 0.35) return { row: 'cause-chip-row-l3', flat: 'cause-flat-chip-l3', name: 'font-semibold text-gray-100', count: 'text-orange-300 font-semibold' };
      if (ratio >= 0.15) return { row: 'cause-chip-row-l2', flat: 'cause-flat-chip-l2', name: 'text-gray-200', count: 'text-yellow-400' };
      return { row: 'cause-chip-row-l1', flat: 'cause-flat-chip-l1', name: 'text-gray-400', count: 'text-gray-500' };
    }

    function togglePowerGiinmul(cause) {
      if (powerState.currentGiinmuls.has(cause)) powerState.currentGiinmuls.delete(cause);
      else powerState.currentGiinmuls.add(cause);
      renderPowerStep1();
    }

    // ── Step 2: 재해형태 선택 ─────────────────────────────────────────
    function renderPowerStep2() {
      showPowerStep(2);
      const names = [...powerState.currentGiinmuls];
      updatePowerBreadcrumb(`${names.join(', ')} → 재해형태 선택`);
      const data = getPowerDataFiltered();

      const typeMap = {};
      data.forEach(r => { const t = r['재해형태']; if (t) typeMap[t] = (typeMap[t] || 0) + 1; });
      const sorted = Object.entries(typeMap).sort((a, b) => b[1] - a[1]);

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">2</div>
        <div><div class="wizard-step-title">재해형태 선택</div>
        <div class="wizard-step-desc">${names.join(', ')}의 재해형태를 선택하세요 (복수 가능)</div></div>
      </div>
      <div class="space-y-2 max-w-lg" id="power-jaehae-list">
        <div class="wizard-check-item">
          <input type="checkbox" id="pw-jh-all" checked>
          <label for="pw-jh-all">전체 (${data.length}건)</label>
        </div>`;
      sorted.forEach(([type, count], i) => {
        html += `<div class="wizard-check-item">
          <input type="checkbox" id="pw-jh-${i}" value="${type.replace(/"/g,'&quot;')}" checked>
          <label for="pw-jh-${i}">${type}</label>
          <span class="item-count">${count}건</span>
        </div>`;
      });
      html += `</div>
      <div class="flex gap-2 mt-4">
        <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="renderPowerStep1(); showPowerStep(1);">이전</button>
        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg" onclick="powerStep2Next()">다음</button>
      </div>`;

      document.getElementById('power-step2').innerHTML = html;

      const allCb = document.getElementById('pw-jh-all');
      const list = document.getElementById('power-jaehae-list');
      allCb.addEventListener('change', () => {
        list.querySelectorAll('input:not(#pw-jh-all)').forEach(cb => { cb.checked = allCb.checked; });
      });
      list.querySelectorAll('input:not(#pw-jh-all)').forEach(cb => {
        cb.addEventListener('change', () => {
          const all = list.querySelectorAll('input:not(#pw-jh-all)');
          allCb.checked = [...all].every(c => c.checked);
        });
      });
    }

    function powerStep2Next() {
      const list = document.getElementById('power-jaehae-list');
      const checked = [...list.querySelectorAll('input:not(#pw-jh-all):checked')].map(cb => cb.value);
      powerState.currentJaehae = checked.length > 0 ? checked : null;
      renderPowerStep3();
    }

    // ── Step 3: 작업명 선택 ───────────────────────────────────────────
    function renderPowerStep3() {
      showPowerStep(3);
      const names = [...powerState.currentGiinmuls];
      updatePowerBreadcrumb(`${names.join(', ')} → 작업명 선택`);
      let data = getPowerDataFiltered();
      if (powerState.currentJaehae) data = data.filter(r => powerState.currentJaehae.includes(r['재해형태']));

      const workMap = {};
      data.forEach(r => { const w = r['작업명']; if (w) workMap[w] = (workMap[w] || 0) + 1; });
      const sorted = Object.entries(workMap).sort((a, b) => b[1] - a[1]);

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">3</div>
        <div><div class="wizard-step-title">작업명 선택</div>
        <div class="wizard-step-desc">유사한 작업명을 선택하세요 (복수 가능)</div></div>
      </div>
      <div class="space-y-2 max-w-lg" id="power-work-list">
        <div class="wizard-check-item">
          <input type="checkbox" id="pw-wk-all" checked>
          <label for="pw-wk-all">전체 (${data.length}건)</label>
        </div>`;
      sorted.forEach(([work, count], i) => {
        html += `<div class="wizard-check-item">
          <input type="checkbox" id="pw-wk-${i}" value="${work.replace(/"/g,'&quot;')}" checked>
          <label for="pw-wk-${i}">${work}</label>
          <span class="item-count">${count}건</span>
        </div>`;
      });
      html += `</div>
      <div class="flex gap-2 mt-4">
        <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="renderPowerStep2(); showPowerStep(2);">이전</button>
        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg" onclick="powerStep3Next()">다음</button>
      </div>`;

      document.getElementById('power-step3').innerHTML = html;

      const allCb = document.getElementById('pw-wk-all');
      const list = document.getElementById('power-work-list');
      allCb.addEventListener('change', () => {
        list.querySelectorAll('input:not(#pw-wk-all)').forEach(cb => { cb.checked = allCb.checked; });
      });
      list.querySelectorAll('input:not(#pw-wk-all)').forEach(cb => {
        cb.addEventListener('change', () => {
          const all = list.querySelectorAll('input:not(#pw-wk-all)');
          allCb.checked = [...all].every(c => c.checked);
        });
      });
    }

    function powerStep3Next() {
      const list = document.getElementById('power-work-list');
      const checked = [...list.querySelectorAll('input:not(#pw-wk-all):checked')].map(cb => cb.value);
      powerState.currentWork = checked.length > 0 ? checked : null;
      renderPowerStep4();
    }

    // ── Step 4: 재해사례 체크박스 테이블 ─────────────────────────────
    function renderPowerStep4() {
      showPowerStep(4);
      const names = [...powerState.currentGiinmuls];
      updatePowerBreadcrumb(`${names.join(', ')} → 재해사례 선택`);

      let data = getPowerDataFiltered();
      if (powerState.currentJaehae) data = data.filter(r => powerState.currentJaehae.includes(r['재해형태']));
      if (powerState.currentWork) data = data.filter(r => powerState.currentWork.includes(r['작업명']));

      powerState.step4CheckedIds = new Set(data.map(r => r.id));

      const columns = [
        { key: '기인물', label: '기인물', width: 90 },
        { key: '재해형태', label: '재해형태', width: 70 },
        { key: '작업명', label: '작업명', width: 120 },
        { key: '재해개요', label: '재해개요', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '위험성감소대책', label: '감소대책', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
      ];

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">4</div>
        <div><div class="wizard-step-title">재해사례 선택</div>
        <div class="wizard-step-desc">평가에 포함할 사례를 선택하세요 (기본: 전체 선택)</div></div>
      </div>
      <div id="power-sel-table"></div>
      <div class="flex gap-2 mt-4 no-print">
        <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="renderPowerStep3(); showPowerStep(3);">이전</button>
        <button class="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-sm rounded-lg" onclick="powerAddAndNext()">추가 후 다음 기인물</button>
        <button class="px-4 py-2 bg-green-600 hover:bg-green-500 text-sm rounded-lg" onclick="powerAddAndFinish()">추가 후 평가 완료</button>
      </div>`;

      document.getElementById('power-step4').innerHTML = html;

      buildSelectableTable('power-sel-table', columns, data, {
        pageSize: 10,
        filterColumns: ['재해형태', '작업명'],
        checkedIds: powerState.step4CheckedIds,
        onCheckChange: (ids) => { powerState.step4CheckedIds = new Set(ids); }
      });
    }

    function powerAddAndNext() {
      powerState.step4CheckedIds.forEach(id => powerState.selectedRows.add(id));
      [...powerState.currentGiinmuls].forEach(g => {
        if (!powerState.processedGiinmuls.includes(g)) powerState.processedGiinmuls.push(g);
      });
      powerState.currentGiinmuls.clear();
      powerState.currentJaehae = null;
      powerState.currentWork = null;
      powerState.step4CheckedIds = new Set();
      renderPowerStep1();
    }

    function powerAddAndFinish() {
      powerState.step4CheckedIds.forEach(id => powerState.selectedRows.add(id));
      [...powerState.currentGiinmuls].forEach(g => {
        if (!powerState.processedGiinmuls.includes(g)) powerState.processedGiinmuls.push(g);
      });
      showPowerResult();
    }

    function showPowerResult() {
      [1,2,3,4].forEach(i => document.getElementById(`power-step${i}`).classList.add('hidden'));
      document.getElementById('power-result').classList.remove('hidden');
      updatePowerBreadcrumb('평가 결과');

      const selectedData = allData.filter(r => powerState.selectedRows.has(r.id));
      document.getElementById('print-title').textContent = `발전업 위험성평가 결과 — ${powerState.processedGiinmuls.join(', ')}`;

      document.getElementById('power-result').innerHTML = `
        <div class="flex items-center justify-between mb-4 no-print">
          <h3 class="text-lg font-semibold text-white">평가 결과 (${selectedData.length}건)</h3>
          <div class="flex gap-2">
            <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="initPower()">다시 선택</button>
            <button class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg" onclick="handlePrintWithCharts()">인쇄 / PDF</button>
          </div>
        </div>
        <div id="power-result-table"></div>`;

      buildTable('power-result-table', [
        { key: 'id', label: 'No', width: 40 },
        { key: '기인물', label: '기인물', width: 90 },
        { key: '재해형태', label: '재해형태', width: 70 },
        { key: '작업명', label: '작업명', width: 120 },
        { key: '재해개요', label: '재해개요', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '재해유발요인', label: '유발요인', minWidth: 180, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '위험성감소대책', label: '감소대책', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
      ], selectedData, { pageSize: 20 });
    }

    // ===================================================================
    //  건설업 위자드
    // ===================================================================
    const constState = { 공종: [], 작업명: [], 단위작업명: [] };

    function resetConstState() {
      constState['공종'] = [];
      constState['작업명'] = [];
      constState['단위작업명'] = [];
    }

    function initConstruction() {
      resetConstState();
      renderConstStep1();
    }

    function showConstStep(n) {
      [1,2,3].forEach(i => {
        document.getElementById(`const-step${i}`).classList.toggle('hidden', i !== n);
      });
      document.getElementById('const-results').classList.add('hidden');
      document.getElementById('const-wizard').classList.remove('hidden');
    }

    function updateConstBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      let parts = [];
      if (constState['공종'].length > 0) {
        const names = constState['공종'].map(g => g.replace(/^\d+\.\s*/, ''));
        parts.push(`<a onclick="showConstStep(1)">${names.length > 2 ? names.slice(0,2).join(', ') + ` 외 ${names.length-2}개` : names.join(', ')}</a>`);
      }
      if (constState['작업명'].length > 0) {
        const names = constState['작업명'];
        parts.push(`<a onclick="showConstStep(2)">${names.length > 2 ? names.slice(0,2).join(', ') + ` 외 ${names.length-2}개` : names.join(', ')}</a>`);
      }
      if (constState['단위작업명'].length > 0) {
        const names = constState['단위작업명'];
        parts.push(`<span class="text-white font-medium">${names.length > 2 ? names.slice(0,2).join(', ') + ` 외 ${names.length-2}개` : names.join(', ')}</span>`);
      }
      bc.innerHTML = parts.length
        ? parts.join('<span class="separator">&#8250;</span>')
        : '<span class="text-gray-500">공종을 선택하세요</span>';
    }

    function resetConstWizard() {
      resetConstState();
      updateConstBreadcrumb();
      document.getElementById('const-results').classList.add('hidden');
      renderConstStep1();
    }

    function renderConstStep1() {
      showConstStep(1);
      const hierarchy = dropdownRef.hierarchy || {};
      const gzList = Object.keys(hierarchy);
      const gzCounts = {};
      allData.forEach(r => { gzCounts[r['공종']] = (gzCounts[r['공종']] || 0) + 1; });

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">1</div>
        <div><div class="wizard-step-title">공종 선택</div>
        <div class="wizard-step-desc">하나 이상의 공종을 선택하세요</div></div>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3" id="const-gz-cards">`;
      gzList.forEach(gz => {
        const shortName = gz.replace(/^\d+\.\s*/, '');
        const count = gzCounts[gz] || 0;
        const isSelected = constState['공종'].includes(gz);
        html += `<div class="wizard-card ${isSelected ? 'selected' : ''}" onclick="toggleConstGZ(this, '${gz.replace(/'/g,"\\'")}')">
          <p class="text-sm font-semibold text-white">${shortName}</p>
          <p class="text-xs text-gray-500 mt-1">${formatNumber(count)}건</p>
          ${isSelected ? '<p class="text-xs text-blue-400 mt-1">&#10003; 선택됨</p>' : ''}
        </div>`;
      });
      html += `</div>
      <div class="flex gap-2 mt-4">
        <button id="const-step1-next" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg transition-colors ${constState['공종'].length===0?'opacity-40 cursor-not-allowed':''}"
          onclick="${constState['공종'].length>0?'constStep1Next()':''}" ${constState['공종'].length===0?'disabled':''}>
          다음 (${constState['공종'].length}개 선택)
        </button>
      </div>`;
      document.getElementById('const-step1').innerHTML = html;
    }

    function toggleConstGZ(el, gz) {
      const idx = constState['공종'].indexOf(gz);
      if (idx >= 0) constState['공종'].splice(idx, 1);
      else constState['공종'].push(gz);
      renderConstStep1();
    }

    function constStep1Next() {
      if (constState['공종'].length === 0) return;
      constState['작업명'] = [];
      constState['단위작업명'] = [];
      updateConstBreadcrumb();
      renderConstStep2();
    }

    function renderConstStep2() {
      showConstStep(2);
      const hierarchy = dropdownRef.hierarchy || {};
      const works = new Set();
      constState['공종'].forEach(gz => {
        if (hierarchy[gz]) Object.keys(hierarchy[gz]).forEach(w => works.add(w));
      });
      const workList = [...works].sort();
      const workCounts = {};
      allData.filter(r => constState['공종'].includes(r['공종'])).forEach(r => {
        workCounts[r['작업명']] = (workCounts[r['작업명']] || 0) + 1;
      });

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">2</div>
        <div><div class="wizard-step-title">작업명 선택</div>
        <div class="wizard-step-desc">하나 이상의 작업명을 선택하세요</div></div>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3" id="const-work-cards">`;
      workList.forEach(w => {
        const count = workCounts[w] || 0;
        const isSelected = constState['작업명'].includes(w);
        html += `<div class="wizard-card ${isSelected?'selected':''}" onclick="toggleConstWork(this,'${w.replace(/'/g,"\\'")}')">
          <p class="text-sm font-semibold text-white">${w}</p>
          <p class="text-xs text-gray-500 mt-1">${formatNumber(count)}건</p>
          ${isSelected?'<p class="text-xs text-blue-400 mt-1">&#10003; 선택됨</p>':''}
        </div>`;
      });
      html += `</div>
      <div class="flex gap-2 mt-4">
        <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="renderConstStep1()">이전</button>
        <button id="const-step2-next" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg ${constState['작업명'].length===0?'opacity-40 cursor-not-allowed':''}"
          onclick="${constState['작업명'].length>0?'constStep2Next()':''}" ${constState['작업명'].length===0?'disabled':''}>
          다음 (${constState['작업명'].length}개 선택)
        </button>
      </div>`;
      document.getElementById('const-step2').innerHTML = html;
    }

    function toggleConstWork(el, w) {
      const idx = constState['작업명'].indexOf(w);
      if (idx >= 0) constState['작업명'].splice(idx, 1);
      else constState['작업명'].push(w);
      renderConstStep2();
    }

    function constStep2Next() {
      if (constState['작업명'].length === 0) return;
      constState['단위작업명'] = [];
      updateConstBreadcrumb();
      renderConstStep3();
    }

    function renderConstStep3() {
      showConstStep(3);
      const hierarchy = dropdownRef.hierarchy || {};
      const units = new Set();
      constState['공종'].forEach(gz => {
        constState['작업명'].forEach(w => {
          if (hierarchy[gz] && hierarchy[gz][w]) hierarchy[gz][w].forEach(u => units.add(u));
        });
      });
      const unitList = [...units].sort();
      const unitCounts = {};
      allData.filter(r => constState['공종'].includes(r['공종']) && constState['작업명'].includes(r['작업명'])).forEach(r => {
        unitCounts[r['단위작업명']] = (unitCounts[r['단위작업명']] || 0) + 1;
      });

      let html = `<div class="wizard-step-header">
        <div class="wizard-step-num">3</div>
        <div><div class="wizard-step-title">단위작업명 선택</div>
        <div class="wizard-step-desc">하나 이상의 단위작업명을 선택하세요</div></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" id="const-unit-cards">`;
      unitList.forEach(u => {
        const count = unitCounts[u] || 0;
        const isSelected = constState['단위작업명'].includes(u);
        html += `<div class="wizard-card ${isSelected?'selected':''}" onclick="toggleConstUnit(this,'${u.replace(/'/g,"\\'")}')">
          <p class="text-sm font-semibold text-white">${u}</p>
          <p class="text-xs text-gray-500 mt-1">${formatNumber(count)}건</p>
          ${isSelected?'<p class="text-xs text-blue-400 mt-1">&#10003; 선택됨</p>':''}
        </div>`;
      });
      html += `</div>
      <div class="flex gap-2 mt-4">
        <button class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg" onclick="renderConstStep2()">이전</button>
        <button id="const-step3-next" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-sm rounded-lg ${constState['단위작업명'].length===0?'opacity-40 cursor-not-allowed':''}"
          onclick="${constState['단위작업명'].length>0?'constStep3Next()':''}" ${constState['단위작업명'].length===0?'disabled':''}>
          결과 보기 (${constState['단위작업명'].length}개 선택)
        </button>
      </div>`;
      document.getElementById('const-step3').innerHTML = html;
    }

    function toggleConstUnit(el, u) {
      const idx = constState['단위작업명'].indexOf(u);
      if (idx >= 0) constState['단위작업명'].splice(idx, 1);
      else constState['단위작업명'].push(u);
      renderConstStep3();
    }

    function constStep3Next() {
      if (constState['단위작업명'].length === 0) return;
      updateConstBreadcrumb();
      showConstResults();
    }

    function showConstResults() {
      document.getElementById('const-wizard').classList.add('hidden');
      document.getElementById('const-results').classList.remove('hidden');
      const filtered = allData.filter(r =>
        constState['공종'].includes(r['공종']) &&
        constState['작업명'].includes(r['작업명']) &&
        constState['단위작업명'].includes(r['단위작업명'])
      );
      const gzNames = constState['공종'].map(g => g.replace(/^\d+\.\s*/, '')).join(', ');
      document.getElementById('print-title').textContent = `건설업 위험성평가 결과 — ${gzNames}`;
      renderRiskCards(filtered);
      renderConstCharts(filtered);
      renderConstTable(filtered);
    }

    function renderRiskCards(data) {
      const combos = {};
      data.forEach(r => {
        const key = `${r['기인물']}|||${r['재해형태']}`;
        if (!combos[key]) combos[key] = { 기인물: r['기인물'], 재해형태: r['재해형태'], count: 0, is12: r['12대기인물'] };
        combos[key].count++;
      });
      const sorted = Object.values(combos).sort((a, b) => b.count - a.count).slice(0, 10);
      const total = data.length;
      document.getElementById('risk-cards').innerHTML = sorted.map((item, i) => {
        const pct = (item.count / total * 100).toFixed(1);
        let riskClass, riskLabel;
        if (item.count >= 10 || i === 0) { riskClass = 'border-red-500/50 bg-red-950/30'; riskLabel = '<span class="risk-badge high">높음</span>'; }
        else if (item.count >= 5) { riskClass = 'border-amber-500/50 bg-amber-950/30'; riskLabel = '<span class="risk-badge medium">중간</span>'; }
        else { riskClass = 'border-green-500/50 bg-green-950/30'; riskLabel = '<span class="risk-badge low">낮음</span>'; }
        return `<div class="rounded-lg border ${riskClass} p-4">
          <div class="flex items-center justify-between mb-2">${riskLabel}${item.is12?'<span class="badge-12">12대</span>':''}</div>
          <p class="text-sm font-semibold text-white">${item.기인물}</p>
          <p class="text-xs text-gray-400 mt-1">재해형태: ${item.재해형태}</p>
          <div class="mt-2 flex items-baseline gap-2">
            <span class="text-xl font-bold text-white">${item.count}</span>
            <span class="text-xs text-gray-500">건 (${pct}%)</span>
          </div>
        </div>`;
      }).join('');
    }

    function renderConstCharts(data) {
      const causeAgg = aggregateBy(data, '기인물');
      const causeSorted = topN(causeAgg, 'count', 8);
      cm.create('chart-risk-cause', {
        type: 'bar',
        data: {
          labels: causeSorted.map(a => a.key),
          datasets: [{ data: causeSorted.map(a => a.count),
            backgroundColor: causeSorted.map((_, i) => CHART_COLORS.getAlpha(CHART_COLORS.getColor(i), 0.7)),
            borderColor: causeSorted.map((_, i) => CHART_COLORS.getColor(i)),
            borderWidth: 1, borderRadius: 3 }]
        },
        options: { indexAxis: 'y', plugins: { legend: { display: false } },
          scales: { x: { grid: { color: '#1F2937' } }, y: { grid: { display: false }, ticks: { font: { size: 10 } } } } }
      });
      const disasterAgg = aggregateBy(data, '재해형태');
      const disasterSorted = topN(disasterAgg, 'count', 8);
      cm.create('chart-risk-disaster', {
        type: 'doughnut',
        data: { labels: disasterSorted.map(a => a.key),
          datasets: [{ data: disasterSorted.map(a => a.count),
            backgroundColor: disasterSorted.map((_, i) => CHART_COLORS.getColor(i)), borderWidth: 0 }] },
        options: { cutout: '50%', plugins: {
          legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } },
          datalabels: { display: true, color: '#fff', font: { size: 9, weight: 'bold' },
            formatter: (value, ctx) => { const t = ctx.dataset.data.reduce((a,b)=>a+b,0); const p=(value/t*100).toFixed(1); return p<5?'':`${value}건\n${p}%`; },
            textAlign: 'center' } } },
        plugins: [ChartDataLabels]
      });
    }

    function renderConstTable(data) {
      buildTable('const-case-table', [
        { key: 'id', label: 'No', width: 40 },
        { key: '기인물', label: '기인물', width: 100, wrap: true },
        { key: '재해형태', label: '재해형태', width: 70 },
        { key: '재해개요', label: '재해개요', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '재해유발요인', label: '유발요인', minWidth: 180, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
        { key: '위험성감소대책', label: '감소대책', minWidth: 200, wrap: true,
          format: (v) => `<div class="text-xs text-gray-300">${v || '-'}</div>` },
      ], data, { pageSize: 10, filterColumns: ['기인물', '재해형태'] });
    }

    init();
  </script>
</body>
</html>
